<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XPT — Docas SGO3</title>
<style>
 
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f1f5f9;color:#1e293b;
     height:100vh;overflow:hidden;display:flex;flex-direction:column}

 
#hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);
     padding:12px 24px;display:flex;align-items:center;
     justify-content:space-between;border-bottom:3px solid #e67e22;flex-shrink:0}
#hdr h1{font-size:clamp(1.3rem,1.6vw,1.9rem);font-weight:800;color:#fff}
#hdr h1 span{color:#e67e22}
.hdr-sub{font-size:clamp(.8rem,.9vw,1rem);color:#94a3b8;margin-top:3px}
.badge-data{background:rgba(230,126,34,.2);color:#e67e22;
            border:1px solid rgba(230,126,34,.4);border-radius:20px;
            padding:5px 16px;font-size:clamp(.9rem,1vw,1.1rem);font-weight:700}
.badge-at{font-size:clamp(.72rem,.8vw,.9rem);color:#94a3b8;text-align:right;margin-top:3px}

 
#kpis{display:flex;gap:8px;padding:8px 24px;flex-shrink:0}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:8px;
     box-shadow:0 1px 3px rgba(0,0,0,.06);padding:8px 18px;flex:1;min-width:0}
.kpi-l{font-size:clamp(.72rem,.8vw,.9rem);color:#94a3b8;text-transform:uppercase;
        letter-spacing:.06em;margin-bottom:3px}
.kpi-v{font-size:clamp(1.5rem,2vw,2.3rem);font-weight:800;color:#1e293b;line-height:1}

 
#legenda{display:flex;gap:12px;padding:0 24px 7px;flex-shrink:0;align-items:center}
.leg-item{display:flex;align-items:center;gap:6px;
          font-size:clamp(.75rem,.85vw,.95rem);color:#64748b;font-weight:600}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-dot.am{background:#f59e0b}
.leg-dot.pm{background:#3b82f6}

 
#mobile-nav{display:none}

 
#grid{display:grid;grid-template-columns:repeat(9,1fr);
      grid-template-rows:1fr;
      gap:8px;padding:0 24px 10px;flex:1;overflow:hidden;min-height:0}

 
.vcard{background:#fff;border:1px solid #e2e8f0;border-radius:10px;
       box-shadow:0 1px 4px rgba(0,0,0,.07);
       display:flex;flex-direction:column;overflow:hidden;min-height:0}

.vc0{border-top:4px solid #3498db}
.vc1{border-top:4px solid #00b894}
.vc2{border-top:4px solid #f39c12}
.vc3{border-top:4px solid #9b59b6}
.vc4{border-top:4px solid #e74c3c}
.vc5{border-top:4px solid #1abc9c}
.vc6{border-top:4px solid #e67e22}

.vc0 .vcard-name{color:#2980b9} .vc0 .vcard-badge{background:#dbeafe;color:#1d4ed8}
.vc1 .vcard-name{color:#00896e} .vc1 .vcard-badge{background:#d1fae5;color:#065f46}
.vc2 .vcard-name{color:#d97706} .vc2 .vcard-badge{background:#fef3c7;color:#92400e}
.vc3 .vcard-name{color:#7c3aed} .vc3 .vcard-badge{background:#ede9fe;color:#4c1d95}
.vc4 .vcard-name{color:#dc2626} .vc4 .vcard-badge{background:#fee2e2;color:#991b1b}
.vc5 .vcard-name{color:#0d9488} .vc5 .vcard-badge{background:#ccfbf1;color:#134e4a}
.vc6 .vcard-name{color:#c2410c} .vc6 .vcard-badge{background:#ffedd5;color:#9a3412}

.vcard-hdr{padding:8px 12px;display:flex;align-items:center;
           justify-content:space-between;border-bottom:1px solid #f1f5f9;
           flex-shrink:0;background:#f8fafc}
.vcard-name{font-size:clamp(.92rem,1.05vw,1.2rem);font-weight:700}
.vcard-sub{font-size:clamp(.68rem,.72vw,.82rem);color:#94a3b8;margin-top:1px}
.vcard-badge{font-size:clamp(.7rem,.78vw,.88rem);padding:3px 9px;
             border-radius:10px;font-weight:700;flex-shrink:0}

 
.id-grid{display:grid;grid-template-columns:1fr 1fr;
         gap:5px;padding:6px;overflow-y:auto;overflow-x:hidden;
         flex:1;min-height:0;align-content:start;
         scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.1) transparent}
.id-grid::-webkit-scrollbar{width:3px}
.id-grid::-webkit-scrollbar-track{background:transparent}
.id-grid::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}

 
.id-card{border-radius:10px;aspect-ratio:1.1/1;width:100%;
         display:flex;flex-direction:column;
         align-items:center;justify-content:center;
         gap:4px;min-width:0;cursor:default}
.id-text{font-size:clamp(.95rem,1.25vw,1.4rem);font-weight:800;text-align:center;
         white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
         width:100%;padding:0 6px;letter-spacing:.2px;font-variant-numeric:tabular-nums}
.ciclo-tag{font-size:clamp(.6rem,.72vw,.82rem);font-weight:800;border-radius:4px;
           padding:3px 7px;flex-shrink:0;letter-spacing:.06em}

 
.c-AM .id-card{background:#fef3c7;border:2px solid #f59e0b}
.c-AM .id-card:hover{background:#fde68a}
.c-AM .id-text{color:#92400e}
.c-AM .ciclo-tag{background:#f59e0b;color:#fff}

.c-PM .id-card{background:#dbeafe;border:2px solid #3b82f6}
.c-PM .id-card:hover{background:#bfdbfe}
.c-PM .id-text{color:#1e40af}
.c-PM .ciclo-tag{background:#3b82f6;color:#fff}

.c-SD .id-card{background:#d1fae5;border:2px solid #10b981}
.c-SD .id-card:hover{background:#a7f3d0}
.c-SD .id-text{color:#065f46}
.c-SD .ciclo-tag{background:#10b981;color:#fff}

.c-XPT .id-card{background:#ffedd5;border:2px solid #e67e22}
.c-XPT .id-card:hover{background:#fed7aa}
.c-XPT .id-text{color:#9a3412}
.c-XPT .ciclo-tag{background:#e67e22;color:#fff}

 
.vcard-bloqueada{background:#f8fafc;border:2px dashed #cbd5e1;border-radius:10px;
                 border-top:4px dashed #cbd5e1;
                 display:flex;flex-direction:column;overflow:hidden;min-height:0}
.vcard-bloqueada .vcard-hdr{background:#f1f5f9;border-bottom:1px dashed #e2e8f0}
.vcard-bloqueada .vcard-name{color:#94a3b8}
.vcard-bloqueada .vcard-badge{background:#f1f5f9;color:#94a3b8;border:1px dashed #cbd5e1}
.bloq-body{flex:1;display:flex;flex-direction:column;align-items:center;
           justify-content:center;gap:6px;padding:12px}
.bloq-icon{font-size:1.6rem;opacity:.35}
.bloq-label{font-size:clamp(.62rem,.7vw,.8rem);color:#94a3b8;font-weight:600;
            text-transform:uppercase;letter-spacing:.06em}

 
.sem-rotas{flex:1;display:flex;align-items:center;justify-content:center;
           color:#cbd5e1;font-size:.72rem}

 
.standby{display:flex;flex-direction:column;align-items:center;
         justify-content:center;flex:1;gap:12px;text-align:center;grid-column:1/-1}
.standby-icon{font-size:2.5rem;animation:pulse 2s ease-in-out infinite}
.standby h2{font-size:1.1rem;font-weight:800;color:#1e293b}
.standby p{color:#94a3b8;font-size:.8rem;max-width:340px;line-height:1.5}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.1)}}

 
#pub-footer{background:#f8fafc;border-top:1px solid #e2e8f0;
            padding:4px 24px;display:flex;gap:14px;flex-wrap:wrap;
            align-items:center;flex-shrink:0}
.pub-item{font-size:.6rem;color:#94a3b8;display:flex;align-items:center;gap:4px}
.pub-dot{width:4px;height:4px;border-radius:50%;background:#e67e22;flex-shrink:0}
.pub-item strong{color:#64748b}

 
.btn-print{background:rgba(230,126,34,.12);color:#c2410c;
           border:1px solid rgba(230,126,34,.4);border-radius:8px;
           padding:6px 14px;font-size:clamp(.72rem,.8vw,.9rem);font-weight:700;
           cursor:pointer;display:flex;align-items:center;gap:6px;
           transition:background .2s;white-space:nowrap;flex-shrink:0}
.btn-print:hover{background:rgba(230,126,34,.22)}

 
.btn-audit{background:rgba(16,185,129,.12);color:#065f46;
           border:1px solid rgba(16,185,129,.4);border-radius:8px;
           padding:6px 14px;font-size:clamp(.72rem,.8vw,.9rem);font-weight:700;
           cursor:pointer;display:flex;align-items:center;gap:6px;
           transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-audit:hover{background:rgba(16,185,129,.22)}
.btn-audit.ativo{background:#10b981;color:#fff;border-color:#059669;
                 box-shadow:0 0 0 3px rgba(16,185,129,.3)}

 
#audit-banner{display:none;background:#f0fdf4;border-bottom:2px solid #10b981;
              padding:5px 24px;font-size:clamp(.7rem,.8vw,.88rem);color:#065f46;
              align-items:center;gap:10px;flex-shrink:0}
#audit-banner.visivel{display:flex}
#audit-prog{font-weight:800;color:#059669;font-size:clamp(.82rem,.95vw,1.05rem)}
#audit-hint{color:#64748b}
.btn-audit-zerar{background:transparent;color:#dc2626;border:1px solid #fca5a5;
                 border-radius:6px;padding:3px 10px;font-size:.72rem;font-weight:700;
                 cursor:pointer;margin-left:auto;flex-shrink:0;transition:background .2s}
.btn-audit-zerar:hover{background:#fee2e2}

 
body.audit-mode .id-card{cursor:pointer;user-select:none;-webkit-user-select:none;
                          transition:transform .12s,box-shadow .12s}

 
body.audit-mode .id-card.pressing{transform:scale(.93);
  box-shadow:0 0 0 3px #10b981 inset;
  animation:press-charge 0.55s linear forwards}
@keyframes press-charge{
  0%  {box-shadow:0 0 0 2px rgba(16,185,129,.4) inset,0 0 0 0 rgba(16,185,129,.5)}
  60% {box-shadow:0 0 0 3px rgba(16,185,129,.8) inset,0 0 0 6px rgba(16,185,129,.15)}
  100%{box-shadow:0 0 0 3px #10b981 inset,0 0 0 10px rgba(16,185,129,0);background:#d1fae5}
}

 
.id-card.auditado{background:#d1fae5!important;border-color:#10b981!important;
                  position:relative}
.id-card.auditado .id-text{color:#064e3b!important}
.id-card.auditado .ciclo-tag{background:#059669!important;color:#fff!important}
.id-card.auditado::after{content:'✓';position:absolute;top:-7px;right:-7px;
  background:#10b981;color:#fff;border-radius:50%;
  width:20px;height:20px;font-size:.8rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 5px rgba(0,0,0,.25);line-height:1;
  pointer-events:none}

 
@media print {
  .btn-audit,#audit-banner{display:none!important}
  .id-card.auditado{background:#d1fae5!important;border-color:#10b981!important}
  .id-card.auditado .id-text{color:#064e3b!important}
  .id-card.auditado::after{display:flex!important}
}

 
@media (max-width:680px) {
  body{height:100vh;overflow:hidden}

   
  #hdr{padding:10px 14px}
  #hdr h1{font-size:1.1rem}
  .hdr-sub{font-size:.68rem}
  .badge-data{font-size:.8rem;padding:3px 10px}
  .badge-at{font-size:.62rem}
  .btn-print{padding:5px 10px;font-size:.75rem}

   
  #kpis{padding:5px 14px;gap:5px;overflow-x:auto;flex-wrap:nowrap}
  .kpi{padding:5px 10px;min-width:90px;flex-shrink:0}
  .kpi-l{font-size:.58rem}
  .kpi-v{font-size:1.15rem}

   
  #legenda{padding:2px 14px 4px;gap:10px}
  .leg-item{font-size:.7rem}

   
  #mobile-nav{display:flex;align-items:center;justify-content:space-between;
              padding:6px 14px;background:#fff;border-bottom:1px solid #e2e8f0;
              flex-shrink:0;gap:8px}
  .nav-btn{background:#1e293b;color:#fff;border:none;border-radius:8px;
           padding:8px 16px;font-size:1.1rem;font-weight:800;cursor:pointer;
           flex-shrink:0;transition:background .15s}
  .nav-btn:active{background:#3b82f6}
  .nav-btn:disabled{background:#e2e8f0;color:#94a3b8;cursor:default}
  #carousel-info{flex:1;text-align:center}
  #carousel-doca{font-size:1rem;font-weight:800;color:#1e293b}
  #carousel-ego{font-size:.72rem;color:#64748b;margin-top:1px}
  #carousel-dots{display:flex;gap:4px;justify-content:center;margin-top:4px}
  .cdot{width:6px;height:6px;border-radius:50%;background:#cbd5e1;transition:all .2s}
  .cdot.active{background:#e67e22;width:14px;border-radius:4px}
  .cdot.bloq{background:#e2e8f0}

   
  #grid{display:block;padding:8px 14px 10px;flex:1;overflow:hidden;min-height:0}
  #grid > *{display:none;height:100%;border-radius:10px}
  #grid > .carousel-active{display:flex}

   
  .vcard.carousel-active,
  .vcard-bloqueada.carousel-active{height:100%;min-height:0}

   
  .id-grid{overflow-y:auto;flex:1;min-height:0}

   
  .id-card{aspect-ratio:1/1}
  .id-text{font-size:1.1rem}
  .ciclo-tag{font-size:.72rem;padding:3px 8px}

   
  #pub-footer{padding:4px 14px;gap:8px}
  .pub-item{font-size:.58rem}
}

 
@media print {
  @page{size:A3 landscape;margin:8mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{height:auto!important;overflow:visible!important;background:#fff!important}
  .btn-print,.btn-audit,#audit-banner,#pub-footer,#mobile-nav{display:none!important}
  #grid{flex:none!important;height:auto!important;overflow:visible!important;
        display:grid!important;grid-template-columns:repeat(9,1fr)!important;
        gap:6px!important;padding:4px 16px!important}
  #grid > *{display:flex!important}
  .vcard,.vcard-bloqueada{overflow:visible!important;break-inside:avoid;
         box-shadow:none!important;border:1px solid #e2e8f0!important}
  .id-grid{overflow:visible!important;height:auto!important;flex:none!important}
  .id-card{aspect-ratio:unset!important;padding:5px 6px!important}
  .id-text{font-size:.72rem!important}
  .ciclo-tag{font-size:.52rem!important;padding:1px 4px!important}
}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>📦 XPT <span>Docas</span> — SGO3</h1>
    <div class="hdr-sub">Distribuição por tipo de serviço · Goiânia / GO</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="btn-audit" id="btn-audit" onclick="toggleAuditoria()" title="Habilita duplo-clique para confirmar rotas">
      🔍 Auditar
    </button>
    <button class="btn-print" onclick="imprimirPDF()" title="Gerar PDF para impressão">
      🖨️ Imprimir / PDF
    </button>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
      <span class="badge-data" id="badge-data">—</span>
      <span class="badge-at"   id="badge-at"></span>
    </div>
  </div>
</div>

<div id="kpis"></div>

<div id="legenda">
  <span style="font-size:.6rem;color:#475569;margin-right:4px">Ciclos:</span>
  <span class="leg-item"><span class="leg-dot am"></span>AM</span>
  <span class="leg-item"><span class="leg-dot pm"></span>PM</span>
</div>


<div id="audit-banner">
  <span>🔍 Auditoria ativa —</span>
  <span id="audit-hint">segure para confirmar uma rota</span>
  <span id="audit-prog">0 / 0</span>
  <button class="btn-audit-zerar" onclick="reiniciarAuditoria()">↺ Zerar</button>
</div>


<div id="mobile-nav">
  <button class="nav-btn" id="nav-prev" onclick="navDoca(-1)">&#8592;</button>
  <div id="carousel-info">
    <div id="carousel-doca">—</div>
    <div id="carousel-ego">—</div>
    <div id="carousel-dots"></div>
  </div>
  <button class="nav-btn" id="nav-next" onclick="navDoca(1)">&#8594;</button>
</div>

<div id="grid"></div>
<div id="pub-footer"></div>

function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


function extrairEGO(svc) {
  var m = String(svc || '').match(/EGO\s*(\d+)/i);
  return m ? 'EGO' + parseInt(m[1], 10) : String(svc || '').trim();
}
function numEGO(s) {
  var m = String(s || '').match(/(\d+)/);
  return m ? parseInt(m[1], 10) : 9999;
}


function extrairCiclo(id) {
  var s = String(id || '').toUpperCase();
  if (s.indexOf('_AM') >= 0) return 'AM';
  if (s.indexOf('_PM') >= 0) return 'PM';
  if (s.indexOf('_SD') >= 0) return 'SD';
  return 'XPT';
}

  });
  EGO_ORDER = Object.keys(GRUPOS).sort(function(a, b) {
    var va = DOCA_MAP[a] != null ? DOCA_MAP[a] : -1;
    var vb = DOCA_MAP[b] != null ? DOCA_MAP[b] : -1;
    return vb - va;
  });
}

function atualizarCarrossel() {
  if (!isMobile()) return;
  var cards = document.querySelectorAll('#grid > *');
  var total = cards.length;
  if (!total) return;

  cards.forEach(function(c, i) {
    c.classList.toggle('carousel-active', i === carouselIdx);
  });

  var docaNum = DOCAS_ORDEM[carouselIdx];
  var isBloq  = DOCAS_BLOQUEADAS.indexOf(docaNum) >= 0;
  var ego     = EGO_BY_DOCA[docaNum];

  var docaEl = document.getElementById('carousel-doca');
  var egoEl  = document.getElementById('carousel-ego');
  if (docaEl) docaEl.textContent = 'Doca ' + docaNum + ' de ' + total;
  if (egoEl)  egoEl.textContent  = isBloq ? '🚫 Bloqueada' : (ego || '');

  
  var dotsEl = document.getElementById('carousel-dots');
  if (dotsEl) {
    dotsEl.innerHTML = DOCAS_ORDEM.map(function(d, i) {
      var cls = 'cdot';
      if (DOCAS_BLOQUEADAS.indexOf(d) >= 0) cls += ' bloq';
      if (i === carouselIdx) cls += ' active';
      return '<span class="' + cls + '"></span>';
    }).join('');
  }

  
  var prev = document.getElementById('nav-prev');
  var next = document.getElementById('nav-next');
  if (prev) prev.disabled = (carouselIdx === 0);
  if (next) next.disabled = (carouselIdx === total - 1);
}

function navDoca(dir) {
  var total = document.querySelectorAll('#grid > *').length;
  carouselIdx = Math.max(0, Math.min(total - 1, carouselIdx + dir));
  atualizarCarrossel();
}


var _touchX = 0;
document.addEventListener('touchstart', function(e) {
  _touchX = e.touches[0].clientX;
  
  iniciarPress(e.target.closest('.id-card[data-id]'));
}, {passive: true});

document.addEventListener('touchmove', function(e) {
  
  cancelarPress();
}, {passive: true});

document.addEventListener('touchend', function(e) {
  cancelarPress(); 
  if (!isMobile()) return;
  var dx = e.changedTouches[0].clientX - _touchX;
  if (dx < -50) navDoca(1);   
  if (dx >  50) navDoca(-1);  
}, {passive: true});


function buildUI() {
  var rows  = Array.isArray(DADOS_RAW.rows) ? DADOS_RAW.rows : [];
  var pubEm = DADOS_RAW.publicadoEm || GERADO_EM;

  document.getElementById('badge-data').textContent = pubEm || GERADO_EM;
  document.getElementById('badge-at').textContent   = 'Publicado em ' + pubEm;

  processarDados();

  var totalPacotes = rows.reduce(function(s, r) {
    return s + (parseInt(r[COL_PACOTES], 10) || 0);
  }, 0);
  document.getElementById('kpis').innerHTML =
    kpi('Total de rotas',    rows.length) +
    kpi('Docas ativas',      EGO_ORDER.length + ' de 7') +
    kpi('Pacotes estimados', totalPacotes.toLocaleString('pt-BR'));

  
  document.getElementById('grid').innerHTML = DOCAS_ORDEM.map(function(docaNum) {
    var isBloqueada = DOCAS_BLOQUEADAS.indexOf(docaNum) >= 0;

    if (isBloqueada) {
      return '<div class="vcard-bloqueada">' +
               '<div class="vcard-hdr">' +
                 '<div>' +
                   '<div class="vcard-name">Doca ' + docaNum + '</div>' +
                   '<div class="vcard-sub">Bloqueada</div>' +
                 '</div>' +
                 '<span class="vcard-badge">—</span>' +
               '</div>' +
               '<div class="bloq-body">' +
                 '<div class="bloq-icon">🚫</div>' +
                 '<div class="bloq-label">Sem operação</div>' +
               '</div>' +
             '</div>';
    }

    var ego    = EGO_BY_DOCA[docaNum];
    var linhas = (ego && GRUPOS[ego]) ? GRUPOS[ego] : [];
    var egoIdx = EGO_ORDER.indexOf(ego);
    var cc     = 'vc' + (egoIdx >= 0 ? Math.min(egoIdx, 6) : 0);

    var cards = linhas.map(function(row) {
      var id    = row[COL_ID] || '—';
      var ciclo = extrairCiclo(id);
      return '<div class="c-' + esc(ciclo) + '">' +
               '<div class="id-card" data-id="' + esc(id) + '">' +
                 '<span class="id-text">' + esc(id) + '</span>' +
                 '<span class="ciclo-tag">' + esc(ciclo) + '</span>' +
               '</div>' +
             '</div>';
    }).join('');

    var body = linhas.length > 0
      ? '<div class="id-grid">' + cards + '</div>'
      : '<div class="sem-rotas">Sem rotas</div>';

    return '<div class="vcard ' + cc + '">' +
             '<div class="vcard-hdr">' +
               '<div>' +
                 '<div class="vcard-name">Doca ' + docaNum + ' &mdash; ' + esc(ego || '') + '</div>' +
                 '<div class="vcard-sub">XPT &middot; ' + esc(ego || '') + '</div>' +
               '</div>' +
               '<span class="vcard-badge">' +
                 linhas.length + ' rota' + (linhas.length !== 1 ? 's' : '') +
               '</span>' +
             '</div>' +
             body +
           '</div>';
  }).join('');

  document.getElementById('pub-footer').innerHTML = EGO_ORDER.map(function(ego) {
    return '<div class="pub-item">' +
             '<span class="pub-dot"></span>' +
             '<strong>' + esc(ego) + '</strong> &middot; ' + esc(pubEm) +
           '</div>';
  }).join('');

  
  if (isMobile()) atualizarCarrossel();
}

function kpi(label, value) {
  return '<div class="kpi">' +
    '<div class="kpi-l">' + esc(label) + '</div>' +
    '<div class="kpi-v">' + esc(String(value)) + '</div>' +
  '</div>';
}


function buildStandby() {
  document.getElementById('badge-data').textContent = GERADO_EM ? String(GERADO_EM).split(' ')[0] : '—';
  document.getElementById('badge-at').textContent   = 'Aguardando publicação';
  document.getElementById('kpis').innerHTML         = '';
  document.getElementById('legenda').style.display  = 'none';
  document.getElementById('mobile-nav').style.display = 'none';
  document.getElementById('pub-footer').innerHTML   = '';
  document.getElementById('grid').innerHTML =
    '<div class="standby">' +
      '<div class="standby-icon">⏳</div>' +
      '<h2>Aguardando publicação</h2>' +
      '<p>Nenhuma rota XPT encontrada.<br>' +
      'Na planilha, use o menu 📋 <strong style="color:#e67e22">Publicar XPT por docas</strong> para atualizar este painel.</p>' +
      '<div style="font-size:.68rem;color:#94a3b8;margin-top:8px">SGO3 &middot; ' + esc(String(GERADO_EM || '')) + '</div>' +
    '</div>';
}



var auditMode = false;
var confirmed = {};   
var AUDIT_KEY = '';   

 
function initAuditKey() {
  var pub = (DADOS_RAW && DADOS_RAW.publicadoEm) ? DADOS_RAW.publicadoEm : GERADO_EM;
  AUDIT_KEY = 'audit_SGO3_' + String(pub || '').replace(/[^0-9]/g, '');
}

 
function salvarAuditoria() {
  try { localStorage.setItem(AUDIT_KEY, JSON.stringify(confirmed)); } catch(e) {}
}

 
function carregarAuditoria() {
  try {
    var raw = localStorage.getItem(AUDIT_KEY);
    if (raw) confirmed = JSON.parse(raw);
  } catch(e) { confirmed = {}; }
  
  document.querySelectorAll('.id-card[data-id]').forEach(function(el) {
    el.classList.toggle('auditado', !!confirmed[el.getAttribute('data-id')]);
  });
  atualizarProgresso();
}

 
function atualizarProgresso() {
  var total = document.querySelectorAll('.id-card[data-id]').length;
  var ok    = Object.keys(confirmed).filter(function(k){ return confirmed[k]; }).length;
  var progEl = document.getElementById('audit-prog');
  if (progEl) {
    progEl.textContent = ok + ' / ' + total + ' confirmadas';
    progEl.style.color = (ok === total && total > 0) ? '#059669' : '#d97706';
  }
}

 
function marcarRota(id) {
  if (!auditMode || !id) return;
  confirmed[id] = !confirmed[id];
  salvarAuditoria();
  
  document.querySelectorAll('.id-card[data-id="' + id.replace(/"/g,'&quot;') + '"]')
    .forEach(function(el) {
      el.classList.toggle('auditado', !!confirmed[id]);
    });
  atualizarProgresso();
}

 
function toggleAuditoria() {
  auditMode = !auditMode;
  document.body.classList.toggle('audit-mode', auditMode);

  var btn    = document.getElementById('btn-audit');
  var banner = document.getElementById('audit-banner');

  if (auditMode) {
    if (btn) { btn.textContent = '✅ Auditoria ON'; btn.classList.add('ativo'); }
    if (banner) banner.classList.add('visivel');
    carregarAuditoria(); 
  } else {
    if (btn) { btn.textContent = '🔍 Auditar'; btn.classList.remove('ativo'); }
    if (banner) banner.classList.remove('visivel');
  }
}

 
function reiniciarAuditoria() {
  confirmed = {};
  salvarAuditoria();
  document.querySelectorAll('.id-card.auditado').forEach(function(el) {
    el.classList.remove('auditado');
  });
  atualizarProgresso();
}


var PRESS_DELAY = 550;  
var _pressTimer = null;
var _pressEl    = null;

function iniciarPress(card) {
  if (!auditMode || !card) return;
  cancelarPress();
  _pressEl = card;
  card.classList.add('pressing');
  _pressTimer = setTimeout(function() {
    _pressTimer = null;
    _pressEl    = null;
    card.classList.remove('pressing');
    marcarRota(card.getAttribute('data-id'));
  }, PRESS_DELAY);
}

function cancelarPress() {
  if (_pressTimer) { clearTimeout(_pressTimer); _pressTimer = null; }
  if (_pressEl)    { _pressEl.classList.remove('pressing'); _pressEl = null; }
}


document.addEventListener('mousedown', function(e) {
  iniciarPress(e.target.closest('.id-card[data-id]'));
});
document.addEventListener('mouseup',    cancelarPress);
document.addEventListener('mouseleave', cancelarPress, true); 


function imprimirPDF() {
  var titulo = document.title;
  var pubEm  = (DADOS_RAW && DADOS_RAW.publicadoEm) ? DADOS_RAW.publicadoEm : GERADO_EM;
  document.title = 'XPT_Docas_SGO3_' + String(pubEm || '').replace(/[/:]/g, '-').replace(/ /g, '_');
  window.print();
  document.title = titulo;
}


window.addEventListener('resize', function() {
  var cards = document.querySelectorAll('#grid > *');
  if (isMobile()) {
    atualizarCarrossel();
  } else {
    cards.forEach(function(c) { c.classList.remove('carousel-active'); });
  }
});


window.addEventListener('load', function() {
  var rows = (DADOS_RAW && Array.isArray(DADOS_RAW.rows)) ? DADOS_RAW.rows : [];
  if (rows.length === 0) {
    buildStandby();
  } else {
    buildUI();
    initAuditKey();   
  }
});
</script>
