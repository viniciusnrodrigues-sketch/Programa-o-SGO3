<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XPT — Docas SGO3</title>
<style>
 
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','Plus Jakarta Sans',system-ui,sans-serif;
     background:#f4f6f9;color:#1e293b;
     height:100vh;overflow:hidden;display:flex;flex-direction:column}

 
#hdr{background:linear-gradient(135deg,#1a1a2e,#16213e);
     padding:11px 24px;display:flex;align-items:center;
     justify-content:space-between;
     border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;
     box-shadow:0 2px 12px rgba(0,0,0,.25)}
#hdr h1{font-size:clamp(1.2rem,1.5vw,1.75rem);font-weight:800;color:#fff}
#hdr h1 span{color:#e67e22}
.hdr-sub{font-size:12px;color:#64748b;margin-top:2px}
.hdr-pub{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.badge-data{background:rgba(255,255,255,.1);color:#e2e8f0;
            border:1px solid rgba(255,255,255,.14);border-radius:8px;
            padding:4px 14px;font-size:clamp(.85rem,.95vw,1rem);font-weight:700;
            letter-spacing:.3px}
.badge-at{font-size:11px;color:#475569;display:flex;align-items:center;gap:5px}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;
          animation:live-pulse 2s ease-in-out infinite}
@keyframes live-pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.5)}
                       50%{opacity:.7;box-shadow:0 0 0 4px rgba(34,197,94,0)}}

 
#kpis{display:flex;gap:8px;padding:8px 20px;flex-shrink:0}
.kpi{background:#fff;border-radius:12px;
     box-shadow:0 1px 3px rgba(0,0,0,.05),0 4px 12px rgba(0,0,0,.04);
     padding:10px 18px;flex:1;min-width:0}
.kpi-l{font-size:11px;color:#94a3b8;text-transform:uppercase;
        letter-spacing:.08em;margin-bottom:4px;font-weight:600}
.kpi-v{font-size:clamp(2rem,2.8vw,2.8rem);font-weight:700;color:#1e293b;line-height:1}

 
#legenda{display:flex;gap:14px;padding:0 20px 6px;flex-shrink:0;align-items:center}
.leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#64748b;font-weight:600}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-dot.am{background:#f59e0b}
.leg-dot.pm{background:#3b82f6}

 
#mobile-nav{display:none}

 
#grid{display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 1fr 44px 1fr 44px 1fr 44px;
      grid-template-rows:1fr;
      gap:12px;padding:0 20px 10px;flex:1;overflow:hidden;min-height:0}

 
.vcard{background:#fff;border-radius:14px;
       box-shadow:0 1px 3px rgba(0,0,0,.06),0 4px 12px rgba(0,0,0,.05);
       display:flex;flex-direction:column;overflow:hidden;min-height:0;
       transition:box-shadow .2s}
.vcard:hover{box-shadow:0 2px 6px rgba(0,0,0,.08),0 8px 20px rgba(0,0,0,.07)}

.vc0{border-top:3px solid #3b82f6}
.vc1{border-top:3px solid #10b981}
.vc2{border-top:3px solid #f59e0b}
.vc3{border-top:3px solid #8b5cf6}
.vc4{border-top:3px solid #ef4444}
.vc5{border-top:3px solid #06b6d4}
.vc6{border-top:3px solid #e67e22}

.vcard-hdr{padding:8px 11px;display:flex;align-items:flex-start;
           justify-content:space-between;border-bottom:1px solid #f1f5f9;
           flex-shrink:0;background:#fafbfc;gap:4px}
.vcard-name{font-size:clamp(13px,1vw,16px);font-weight:600;color:#1e293b;line-height:1.2}
.vcard-sub{font-size:11px;color:#94a3b8;margin-top:3px;font-weight:500}

 
.vcard-cidade{font-size:10px;color:#3b82f6;font-weight:700;
              display:flex;align-items:center;gap:3px;margin-top:3px;
              letter-spacing:.01em;white-space:nowrap;overflow:hidden;
              text-overflow:ellipsis}

.vcard-badge{font-size:11px;padding:3px 8px;border-radius:8px;
             font-weight:700;flex-shrink:0;white-space:nowrap;margin-top:1px}
.badge-ok   {background:#dcfce7;color:#15803d}
.badge-amber{background:#fef9c3;color:#a16207}
.badge-red  {background:#fee2e2;color:#b91c1c}
.badge-pkg  {background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;
             font-size:10px;padding:2px 7px;border-radius:8px;
             font-weight:700;flex-shrink:0;white-space:nowrap;margin-top:1px}
.vcard-badges{display:flex;flex-direction:column;align-items:flex-end;gap:3px}

 
.id-grid{display:grid;grid-template-columns:1fr 1fr;
         gap:6px;padding:7px;overflow-y:auto;overflow-x:hidden;
         flex:1;min-height:0;align-content:start;
         scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.08) transparent}
.id-grid::-webkit-scrollbar{width:3px}
.id-grid::-webkit-scrollbar-track{background:transparent}
.id-grid::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:3px}

 
.id-card{background:#fff;border:1px solid #e8ecf0;
         border-left:4px solid #e2e8f0;
         border-radius:8px;
         padding:7px 8px;
         display:flex;flex-direction:column;align-items:flex-start;
         justify-content:space-between;
         width:100%;min-width:0;min-height:52px;
         gap:4px;cursor:default;
         transition:transform .15s,box-shadow .15s}
.id-card:hover{transform:translateY(-1px);
               box-shadow:0 3px 10px rgba(0,0,0,.09)}
.id-text{font-size:clamp(11px,1.1vw,13px);font-weight:600;color:#1e293b;
         white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
         width:100%;font-variant-numeric:tabular-nums}
.ciclo-tag{font-size:10px;font-weight:800;border-radius:4px;
           padding:2px 6px;flex-shrink:0;letter-spacing:.05em;align-self:flex-start}

.c-AM .id-card{border-left-color:#f59e0b}
.c-AM .ciclo-tag{background:#fef3c7;color:#92400e}
.c-PM .id-card{border-left-color:#3b82f6}
.c-PM .ciclo-tag{background:#dbeafe;color:#1e40af}
.c-SD .id-card{border-left-color:#10b981}
.c-SD .ciclo-tag{background:#d1fae5;color:#065f46}
.c-XPT .id-card{border-left-color:#e67e22}
.c-XPT .ciclo-tag{background:#ffedd5;color:#9a3412}

 
.vcard-inativa{
  background:repeating-linear-gradient(
    -45deg,#fff7ed,#fff7ed 5px,#ffedd5 5px,#ffedd5 10px
  );
  border:1px dashed #f97316;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;overflow:hidden;min-height:0;gap:5px;padding:10px 4px}
.inativa-icon{font-size:16px}
.inativa-num{font-size:12px;font-weight:800;color:#9a3412;
             writing-mode:vertical-lr;text-orientation:mixed}
.inativa-badge{font-size:8px;font-weight:800;color:#c2410c;text-transform:uppercase;
               letter-spacing:.08em;text-align:center;line-height:1.3;
               writing-mode:vertical-lr;text-orientation:mixed}

 
.vcard-bloqueada{
  background:repeating-linear-gradient(
    -45deg,#f1f5f9,#f1f5f9 5px,#e4e9f0 5px,#e4e9f0 10px
  );
  border:1px dashed #cbd5e1;border-radius:14px;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;overflow:hidden;min-height:0;gap:6px;
  padding:8px 0}
.bloq-num{font-size:12px;font-weight:800;color:#94a3b8;
          writing-mode:vertical-lr;text-orientation:mixed}
.bloq-label{font-size:9px;font-weight:700;color:#94a3b8;
            text-transform:uppercase;letter-spacing:.1em;
            writing-mode:vertical-lr;text-orientation:mixed}
.bloq-icon{font-size:14px;opacity:.3}

 
.vcard-veiculo{display:flex;align-items:center;gap:5px;flex-wrap:wrap;
               padding:5px 11px;border-bottom:1px solid #f1f5f9;flex-shrink:0;
               min-height:28px}
.vv-ok    {background:#f0fdf4}
.vv-warn  {background:#fffbeb}
.vv-danger{background:#fff1f2}

.vv-chip{display:inline-flex;align-items:center;gap:3px;
         font-size:10px;font-weight:700;border-radius:5px;
         padding:2px 7px;white-space:nowrap;line-height:1.4}
.chip-green{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.chip-amber{background:#fef9c3;color:#a16207;border:1px solid #fde68a}
.chip-red  {background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
.chip-warn {background:#fef3c7;color:#b45309;border:1px solid #fde68a}

.vv-sep{font-size:11px;color:#94a3b8;font-weight:700;flex-shrink:0}

.vv-nbadge{font-size:9px;font-weight:800;border-radius:4px;padding:2px 6px;
           margin-left:auto;flex-shrink:0;white-space:nowrap}
.vv-nbadge.ok  {background:#dcfce7;color:#15803d}
.vv-nbadge.warn{background:#fef3c7;color:#92400e}
.vv-nbadge.over{background:#fee2e2;color:#b91c1c}

.vv-bar-wrap{width:100%;height:3px;background:#e8ecf0;border-radius:2px;
             margin-top:3px;overflow:hidden}
.vv-bar{height:100%;border-radius:2px;transition:width .3s}
.vv-bar.green{background:#22c55e}
.vv-bar.amber{background:#f59e0b}
.vv-bar.red  {background:#ef4444}

 
.sem-rotas{flex:1;display:flex;align-items:center;justify-content:center;
           color:#cbd5e1;font-size:11px;font-weight:500}

 
.standby{display:flex;flex-direction:column;align-items:center;
         justify-content:center;flex:1;gap:12px;text-align:center;grid-column:1/-1}
.standby-icon{font-size:2.5rem;animation:pulse 2s ease-in-out infinite}
.standby h2{font-size:1.1rem;font-weight:800;color:#1e293b}
.standby p{color:#94a3b8;font-size:.8rem;max-width:340px;line-height:1.5}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.1)}}

 
#pub-footer{background:#fff;border-top:1px solid #e8ecf0;
            padding:5px 20px;display:flex;gap:16px;flex-wrap:wrap;
            align-items:center;flex-shrink:0}
.pub-item{font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:5px}
.pub-dot{width:5px;height:5px;border-radius:50%;background:#e67e22;flex-shrink:0}
.pub-item strong{color:#475569;font-weight:600}

 
.btn-print{background:rgba(230,126,34,.1);color:#c2410c;
           border:1px solid rgba(230,126,34,.3);border-radius:8px;
           padding:6px 13px;font-size:12px;font-weight:700;
           cursor:pointer;display:flex;align-items:center;gap:5px;
           transition:background .2s;white-space:nowrap;flex-shrink:0}
.btn-print:hover{background:rgba(230,126,34,.2)}

.btn-audit{background:rgba(16,185,129,.1);color:#065f46;
           border:1px solid rgba(16,185,129,.35);border-radius:8px;
           padding:6px 13px;font-size:12px;font-weight:700;
           cursor:pointer;display:flex;align-items:center;gap:5px;
           transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-audit:hover{background:rgba(16,185,129,.2)}
.btn-audit.ativo{background:#10b981;color:#fff;border-color:#059669;
                 box-shadow:0 0 0 3px rgba(16,185,129,.25)}

#audit-banner{display:none;background:#f0fdf4;border-bottom:2px solid #10b981;
              padding:5px 20px;font-size:12px;color:#065f46;
              align-items:center;gap:10px;flex-shrink:0}
#audit-banner.visivel{display:flex}
#audit-prog{font-weight:800;color:#059669;font-size:13px}
.btn-audit-zerar{background:transparent;color:#dc2626;border:1px solid #fca5a5;
                 border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;
                 cursor:pointer;margin-left:auto;flex-shrink:0;transition:background .2s}
.btn-audit-zerar:hover{background:#fee2e2}

body.audit-mode .id-card{cursor:pointer;user-select:none;-webkit-user-select:none;
                          transition:transform .12s,box-shadow .12s}
body.audit-mode .id-card.pressing{transform:scale(.94);
  box-shadow:0 0 0 3px #10b981 inset;
  animation:press-charge 0.55s linear forwards}
@keyframes press-charge{
  0%  {box-shadow:0 0 0 2px rgba(16,185,129,.4) inset}
  100%{box-shadow:0 0 0 3px #10b981 inset;background:#d1fae5}
}

.id-card.auditado{background:#d1fae5!important;border-left-color:#10b981!important;
                  border-color:#a7f3d0!important;position:relative}
.id-card.auditado .id-text{color:#064e3b!important}
.id-card.auditado .ciclo-tag{background:#10b981!important;color:#fff!important}
.id-card.auditado::after{content:'✓';position:absolute;top:-7px;right:-7px;
  background:#10b981;color:#fff;border-radius:50%;
  width:18px;height:18px;font-size:.75rem;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 5px rgba(0,0,0,.2);pointer-events:none}

 
@media (max-width:680px){
  body{height:100vh;overflow:hidden}
  #hdr{padding:10px 14px}
  #hdr h1{font-size:1.05rem}
  .hdr-sub{font-size:11px}
  .badge-data{font-size:.82rem;padding:3px 10px}
  .btn-print,.btn-audit{padding:5px 10px;font-size:.72rem}
  #kpis{padding:5px 14px;gap:5px;overflow-x:auto;flex-wrap:nowrap}
  .kpi{padding:6px 12px;min-width:88px;flex-shrink:0}
  .kpi-l{font-size:10px}
  .kpi-v{font-size:1.5rem}
  #legenda{padding:2px 14px 4px;gap:10px}
  #mobile-nav{display:flex;align-items:center;justify-content:space-between;
              padding:6px 14px;background:#fff;border-bottom:1px solid #e8ecf0;
              flex-shrink:0;gap:8px}
  .nav-btn{background:#1e293b;color:#fff;border:none;border-radius:8px;
           padding:8px 16px;font-size:1.1rem;font-weight:800;cursor:pointer;
           flex-shrink:0;transition:background .15s}
  .nav-btn:active{background:#3b82f6}
  .nav-btn:disabled{background:#e2e8f0;color:#94a3b8;cursor:default}
  #carousel-info{flex:1;text-align:center}
  #carousel-doca{font-size:1rem;font-weight:800;color:#1e293b}
  #carousel-ego{font-size:.72rem;color:#64748b;margin-top:1px}
  #carousel-dots{display:flex;gap:4px;justify-content:center;margin-top:4px}
  .cdot{width:6px;height:6px;border-radius:50%;background:#cbd5e1;transition:all .2s}
  .cdot.active{background:#e67e22;width:14px;border-radius:4px}
  .cdot.bloq{background:#e2e8f0}
  #grid{display:block;padding:8px 14px 10px;flex:1;overflow:hidden;min-height:0}
  #grid > *{display:none;height:100%;border-radius:14px}
  #grid > .carousel-active{display:flex}
  .vcard.carousel-active,
  .vcard-bloqueada.carousel-active{height:100%;min-height:0}
  .id-grid{overflow-y:auto;flex:1;min-height:0}
  .id-card{min-height:44px}
  .id-text{font-size:12px}
  #pub-footer{padding:4px 14px;gap:8px}
}

 
@media print{
  @page{size:A3 landscape;margin:8mm}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{height:auto!important;overflow:visible!important;background:#fff!important}
  .btn-print,.btn-audit,#audit-banner,#pub-footer,#mobile-nav{display:none!important}
  #grid{flex:none!important;height:auto!important;overflow:visible!important;
        display:grid!important;
        grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr 1fr 36px 1fr 36px 1fr 36px!important;
        gap:6px!important;padding:4px 14px!important}
  #grid > *{display:flex!important}
  .vcard,.vcard-bloqueada{overflow:visible!important;break-inside:avoid;
         box-shadow:none!important;border:1px solid #e2e8f0!important}
  .id-grid{overflow:visible!important;height:auto!important;flex:none!important}
  .id-card{min-height:auto!important;padding:4px 6px!important}
  .id-text{font-size:10px!important}
  .ciclo-tag{font-size:9px!important;padding:1px 4px!important}
  .id-card.auditado{background:#d1fae5!important}
  .id-card.auditado::after{display:flex!important}
  .vcard-veiculo{font-size:9px!important;padding:3px 8px!important}
  .vv-detail{display:none!important}
}
</style>
</head>
<body>

<div id="hdr">
  <div>
    <h1>📦 XPT <span>Docas</span> — SGO3</h1>
    <div class="hdr-sub">Distribuição por tipo de serviço · Goiânia / GO</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="btn-audit" id="btn-audit" onclick="toggleAuditoria()" title="Segure nos cards para confirmar rotas">
      🔍 Auditar
    </button>
    <button class="btn-print" onclick="imprimirPDF()" title="Gerar PDF">
      🖨️ Imprimir
    </button>
    <div class="hdr-pub">
      <span class="badge-data" id="badge-data">—</span>
      <span class="badge-at" id="badge-at">
        <span class="live-dot"></span><span id="badge-at-txt"></span>
      </span>
    </div>
  </div>
</div>

<div id="kpis"></div>

<div id="legenda">
  <span style="font-size:11px;color:#94a3b8;font-weight:600;margin-right:2px">Ciclos:</span>
  <span class="leg-item"><span class="leg-dot am"></span>AM</span>
  <span class="leg-item"><span class="leg-dot pm"></span>PM</span>
</div>

<div id="audit-banner">
  <span>🔍 Auditoria ativa —</span>
  <span id="audit-hint">segure para confirmar uma rota</span>
  <span id="audit-prog">0 / 0</span>
  <button class="btn-audit-zerar" onclick="reiniciarAuditoria()">↺ Zerar</button>
</div>

<div id="mobile-nav">
  <button class="nav-btn" id="nav-prev" onclick="navDoca(-1)">&#8592;</button>
  <div id="carousel-info">
    <div id="carousel-doca">—</div>
    <div id="carousel-ego">—</div>
    <div id="carousel-dots"></div>
  </div>
  <button class="nav-btn" id="nav-next" onclick="navDoca(1)">&#8594;</button>
</div>

<div id="grid"></div>
<div id="pub-footer"></div>

function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function extrairEGO(svc){
  var m=String(svc||'').match(/EGO\s*(\d+)/i);
  return m?'EGO'+parseInt(m[1],10):String(svc||'').trim();
}
function extrairCiclo(id){
  var s=String(id||'').toUpperCase();
  if(s.indexOf('_AM')>=0)return'AM';
  if(s.indexOf('_PM')>=0)return'PM';
  if(s.indexOf('_SD')>=0)return'SD';
  return'XPT';
}

var GRUPOS={},EGO_ORDER=[];
var COL_ID='ID Otimizado',COL_SERVICO='Tipos de serviços',COL_PACOTES='Pacotes estimados';

function processarDados(){
  var rows=Array.isArray(DADOS_RAW.rows)?DADOS_RAW.rows:[];
  GRUPOS={};
  rows.forEach(function(row){
    var ego=extrairEGO(row[COL_SERVICO]||'');
    if(!ego)return;
    if(!GRUPOS[ego])GRUPOS[ego]=[];
    GRUPOS[ego].push(row);
  });
  EGO_ORDER=Object.keys(GRUPOS).sort(function(a,b){
    var va=DOCA_MAP[a]!=null?DOCA_MAP[a]:-1;
    var vb=DOCA_MAP[b]!=null?DOCA_MAP[b]:-1;
    return vb-va;
  });
}

var CAP  = { Toco:10, Truck:15, Carreta:28 };
var ICON = { Toco:'🚚', Truck:'🚛', Carreta:'🚌' };

function _chipColor(used, cap) {
  var pct = used / cap;
  if (pct <= 0.75) return 'chip-green';
  if (pct <  1)    return 'chip-amber';
  return 'chip-red';
}

function _mkChip(type, used) {
  var cap = CAP[type];
  var pct = Math.round(used / cap * 100);
  var cls = _chipColor(used, cap);
  return '<span class="vv-chip ' + cls + '">' +
    ICON[type] + ' ' + type + ' · ' + used + '/' + cap +
    ' <span style="opacity:.75">(' + pct + '%)</span>' +
  '</span>';
}

function sugerirVeiculo(ego, count) {
  if (!count || count === 0) return null;
  var carreta = (ego === 'EGO3');

  if (count <= 10) return { cls:'',        slots:[{t:'Toco',   n:count}], n:1 };
  if (count <= 15) return { cls:'',        slots:[{t:'Truck',  n:count}], n:1 };

  if (carreta) {
    if (count <= 28) return { cls:'',      slots:[{t:'Carreta',n:count}], n:1 };
    return { cls:'vv-danger', overflow:true, count:count };
  }

  if (count > 30)  return { cls:'vv-danger', overflow:true, count:count };

  var a, b;
  if (count <= 20) {
    a = Math.ceil(count / 2); b = count - a;
    return { cls:'vv-warn', slots:[{t:'Toco',n:a},{t:'Toco',n:b}], n:2 };
  }
  if (count <= 25) {
    return { cls:'vv-warn', slots:[{t:'Truck',n:15},{t:'Toco',n:count-15}], n:2 };
  }
  a = Math.ceil(count / 2); b = count - a;
  return { cls:'vv-warn', slots:[{t:'Truck',n:a},{t:'Truck',n:b}], n:2 };
}

function htmlVeiculo(ego, count) {
  var s = sugerirVeiculo(ego, count);
  if (!s) return '';

  if (s.overflow) {
    return '<div class="vcard-veiculo vv-danger">' +
      '<span class="vv-chip chip-red">⚠️ Sobrecarga · ' + s.count + ' rotas</span>' +
      '<span class="vv-nbadge over" style="margin-left:auto">Verificar</span>' +
    '</div>';
  }

  var nbadge    = s.n === 1 ? '1 veículo' : s.n + ' veículos';
  var nbadgeCls = s.n === 1 ? 'ok' : 'warn';

  var chips = s.slots.map(function(sl){ return _mkChip(sl.t, sl.n); });
  return '<div class="vcard-veiculo ' + s.cls + '">' +
    chips.join('<span class="vv-sep">＋</span>') +
    '<span class="vv-nbadge ' + nbadgeCls + '">' + nbadge + '</span>' +
  '</div>';
}

function badgeRoutes(n){
  var cls=n>20?'badge-red':n>15?'badge-amber':'badge-ok';
  return '<span class="vcard-badge '+cls+'">'+n+' rota'+(n!==1?'s':'')+'</span>';
}

function badgePacotes(n){
  if(!n)return '';
  var fmt=n>=1000?(n/1000).toFixed(1).replace('.',',')+'k':String(n);
  return '<span class="badge-pkg">📦 '+fmt+' pkg</span>';
}

 
var carouselIdx=0;
function isMobile(){return window.innerWidth<=680;}

function atualizarCarrossel(){
  if(!isMobile())return;
  var cards=document.querySelectorAll('#grid > *');
  var total=cards.length;
  if(!total)return;
  cards.forEach(function(c,i){c.classList.toggle('carousel-active',i===carouselIdx);});
  var docaNum=DOCAS_ORDEM[carouselIdx];
  var isBloq=DOCAS_BLOQUEADAS.indexOf(docaNum)>=0;
  var isInativa=DOCAS_INATIVAS.indexOf(docaNum)>=0;
  var ego=EGO_BY_DOCA[docaNum];
  var cidade=ego?CIDADE_MAP[ego]:'';
  var docaEl=document.getElementById('carousel-doca');
  var egoEl=document.getElementById('carousel-ego');
  if(docaEl)docaEl.textContent='Doca '+docaNum+' de '+total;
  if(egoEl) egoEl.textContent=isBloq?'🚫 Bloqueada':isInativa?'⚠️ Prob. Operacional':(ego||'')+(cidade?' · '+cidade:'');
  var dotsEl=document.getElementById('carousel-dots');
  if(dotsEl){
    dotsEl.innerHTML=DOCAS_ORDEM.map(function(d,i){
      var cls='cdot';
      if(DOCAS_BLOQUEADAS.indexOf(d)>=0)cls+=' bloq';
      if(i===carouselIdx)cls+=' active';
      return'<span class="'+cls+'"></span>';
    }).join('');
  }
  var prev=document.getElementById('nav-prev');
  var next=document.getElementById('nav-next');
  if(prev)prev.disabled=(carouselIdx===0);
  if(next)next.disabled=(carouselIdx===total-1);
}
function navDoca(dir){
  var total=document.querySelectorAll('#grid > *').length;
  carouselIdx=Math.max(0,Math.min(total-1,carouselIdx+dir));
  atualizarCarrossel();
}

var _touchX=0;
document.addEventListener('touchstart',function(e){
  _touchX=e.touches[0].clientX;
  iniciarPress(e.target.closest('.id-card[data-id]'));
},{passive:true});
document.addEventListener('touchmove',function(){cancelarPress();},{passive:true});
document.addEventListener('touchend',function(e){
  cancelarPress();
  if(!isMobile())return;
  var dx=e.changedTouches[0].clientX-_touchX;
  if(dx<-50)navDoca(1);
  if(dx> 50)navDoca(-1);
},{passive:true});

        return extrairCiclo(row[COL_ID]||'')===cicloFiltro;
      });
    }
    var egoIdx=EGO_ORDER.indexOf(ego);
    var cc='vc'+(egoIdx>=0?Math.min(egoIdx,6):0);

    var cards=linhas.map(function(row){
      var id=row[COL_ID]||'—';
      var ciclo=extrairCiclo(id);
      return '<div class="c-'+esc(ciclo)+'">'+
               '<div class="id-card" data-id="'+esc(id)+'">'+

             '</div>';
    }).join('');

    var pkgDoca=linhas.reduce(function(s,r){return s+(parseInt(r[COL_PACOTES],10)||0);},0);

    var body=linhas.length>0
      ?'<div class="id-grid">'+cards+'</div>'
      :'<div class="sem-rotas">Sem rotas</div>';

     
    var cidadeHtml=cidade
      ?'<div class="vcard-cidade">📍 '+esc(cidade)+'</div>'
      :'';

    return '<div class="vcard '+cc+'">'+
             '<div class="vcard-hdr">'+
               '<div style="min-width:0;overflow:hidden">'+
                 '<div class="vcard-name">Doca '+docaNum+'</div>'+
                 '<div class="vcard-sub">'+esc(ego||'')+(cicloFiltro?' · <span style="font-weight:800;color:'+(cicloFiltro==='AM'?'#92400e':'#1e40af')+'">'+cicloFiltro+'</span>':'')+'</div>'+
                 cidadeHtml+
               '</div>'+
               '<div class="vcard-badges">'+
                 badgeRoutes(linhas.length)+
                 badgePacotes(pkgDoca)+
               '</div>'+
             '</div>'+
             htmlVeiculo(ego||'', linhas.length)+
             body+
           '</div>';
  }).join('');

  document.getElementById('pub-footer').innerHTML=
    '<div class="pub-item"><span class="pub-dot"></span><strong>SGO3</strong> · XPT Docas · '+esc(pubEm)+'</div>'+
    EGO_ORDER.map(function(ego){
      var cidade=CIDADE_MAP[ego]?(' · '+CIDADE_MAP[ego]):'';
      return '<div class="pub-item">'+
               '<span class="pub-dot" style="background:#64748b"></span>'+
               '<strong>'+esc(ego)+'</strong> · Doca '+esc(String(DOCA_MAP[ego]||'?'))+esc(cidade)+'</div>';
    }).join('');

  if(isMobile())atualizarCarrossel();
}

function kpi(label,value){
  return '<div class="kpi">'+
    '<div class="kpi-l">'+esc(label)+'</div>'+
    '<div class="kpi-v">'+esc(String(value))+'</div>'+
  '</div>';
}

 
function buildStandby(){
  var txt=GERADO_EM?String(GERADO_EM).split(' ')[0]:'—';
  document.getElementById('badge-data').textContent=txt;
  var atTxt=document.getElementById('badge-at-txt');
  if(atTxt)atTxt.textContent='Aguardando publicação';
  document.getElementById('kpis').innerHTML='';
  document.getElementById('legenda').style.display='none';
  document.getElementById('mobile-nav').style.display='none';
  document.getElementById('pub-footer').innerHTML='';
  document.getElementById('grid').innerHTML=
    '<div class="standby">'+
      '<div class="standby-icon">⏳</div>'+
      '<h2>Aguardando publicação</h2>'+
      '<p>Nenhuma rota XPT encontrada.<br>'+
      'Na planilha, use o menu 📋 <strong style="color:#e67e22">Publicar XPT por docas</strong>.</p>'+
      '<div style="font-size:11px;color:#94a3b8;margin-top:8px">SGO3 · '+esc(String(GERADO_EM||''))+'</div>'+
    '</div>';
}

 
var auditMode=false,confirmed={},AUDIT_KEY='';

function initAuditKey(){
  var pub=(DADOS_RAW&&DADOS_RAW.publicadoEm)?DADOS_RAW.publicadoEm:GERADO_EM;
  AUDIT_KEY='audit_SGO3_'+String(pub||'').replace(/[^0-9]/g,'');
}
function salvarAuditoria(){
  try{localStorage.setItem(AUDIT_KEY,JSON.stringify(confirmed));}catch(e){}
}
function carregarAuditoria(){
  try{var r=localStorage.getItem(AUDIT_KEY);if(r)confirmed=JSON.parse(r);}catch(e){confirmed={};}
  document.querySelectorAll('.id-card[data-id]').forEach(function(el){
    el.classList.toggle('auditado',!!confirmed[el.getAttribute('data-id')]);
  });
  atualizarProgresso();
}
function atualizarProgresso(){
  var total=document.querySelectorAll('.id-card[data-id]').length;
  var ok=Object.keys(confirmed).filter(function(k){return confirmed[k];}).length;
  var p=document.getElementById('audit-prog');
  if(p){p.textContent=ok+' / '+total+' confirmadas';
        p.style.color=(ok===total&&total>0)?'#059669':'#d97706';}
}
function marcarRota(id){
  if(!auditMode||!id)return;
  confirmed[id]=!confirmed[id];
  salvarAuditoria();
  document.querySelectorAll('.id-card[data-id="'+id.replace(/"/g,'&quot;')+'"]')
    .forEach(function(el){el.classList.toggle('auditado',!!confirmed[id]);});
  atualizarProgresso();
}
function toggleAuditoria(){
  auditMode=!auditMode;
  document.body.classList.toggle('audit-mode',auditMode);
  var btn=document.getElementById('btn-audit');
  var banner=document.getElementById('audit-banner');
  if(auditMode){
    if(btn){btn.textContent='✅ Auditoria ON';btn.classList.add('ativo');}
    if(banner)banner.classList.add('visivel');
    carregarAuditoria();
  }else{
    if(btn){btn.textContent='🔍 Auditar';btn.classList.remove('ativo');}
    if(banner)banner.classList.remove('visivel');
  }
}
function reiniciarAuditoria(){
  confirmed={};salvarAuditoria();
  document.querySelectorAll('.id-card.auditado').forEach(function(el){el.classList.remove('auditado');});
  atualizarProgresso();
}

 
var PRESS_DELAY=550,_pressTimer=null,_pressEl=null;
function iniciarPress(card){
  if(!auditMode||!card)return;
  cancelarPress();
  _pressEl=card;card.classList.add('pressing');
  _pressTimer=setTimeout(function(){
    _pressTimer=null;_pressEl=null;
    card.classList.remove('pressing');
    marcarRota(card.getAttribute('data-id'));
  },PRESS_DELAY);
}
function cancelarPress(){
  if(_pressTimer){clearTimeout(_pressTimer);_pressTimer=null;}
  if(_pressEl){_pressEl.classList.remove('pressing');_pressEl=null;}
}
document.addEventListener('mousedown',function(e){iniciarPress(e.target.closest('.id-card[data-id]'));});
document.addEventListener('mouseup',cancelarPress);
document.addEventListener('mouseleave',cancelarPress,true);

 
function imprimirPDF(){
  var t=document.title;
  var p=(DADOS_RAW&&DADOS_RAW.publicadoEm)?DADOS_RAW.publicadoEm:GERADO_EM;
  document.title='XPT_Docas_SGO3_'+String(p||'').replace(/[/:]/g,'-').replace(/ /g,'_');
  window.print();document.title=t;
}

window.addEventListener('resize',function(){
  var cards=document.querySelectorAll('#grid > *');
  if(isMobile()){atualizarCarrossel();}
  else{cards.forEach(function(c){c.classList.remove('carousel-active');});}
});

window.addEventListener('load',function(){
  var rows=(DADOS_RAW&&Array.isArray(DADOS_RAW.rows))?DADOS_RAW.rows:[];
  if(rows.length===0){buildStandby();}else{buildUI();initAuditKey();}
});
</script>
</body>
</html>
