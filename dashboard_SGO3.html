<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Programação SGO3</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.5.1/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#e2e8f0;min-height:100vh}
#header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #00b894;box-shadow:0 4px 24px rgba(0,0,0,.5)}
#header h1{font-size:1.5rem;font-weight:800;letter-spacing:.5px}
#header h1 span{color:#00b894}
.hdr-sub{font-size:.83rem;color:#94a3b8;margin-top:3px}
.hdr-right{text-align:right;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
.badge-data{background:rgba(0,184,148,.15);color:#00b894;border:1px solid rgba(0,184,148,.3);border-radius:20px;padding:5px 14px;font-size:.82rem;font-weight:700}
.badge-at{font-size:.75rem;color:#64748b}
#tabs-bar{background:#131826;border-bottom:1px solid #1e2a3a;padding:0 28px;display:flex;gap:2px;overflow-x:auto}
.tab-btn{padding:14px 20px;background:transparent;border:none;color:#94a3b8;cursor:pointer;font-size:.88rem;font-weight:600;border-bottom:3px solid transparent;transition:.2s;white-space:nowrap;display:flex;align-items:center;gap:8px}
.tab-btn:hover{color:#e2e8f0;background:rgba(255,255,255,.04)}
.tab-btn.active{color:#00b894;border-bottom-color:#00b894}
.tab-badge{font-size:.72rem;padding:2px 9px;border-radius:10px;font-weight:700}
.tab-badge.ok{background:rgba(0,184,148,.15);color:#00b894}
.tab-badge.wait{background:rgba(245,158,11,.12);color:#f59e0b}
.tab-pane{display:none;padding:28px 32px}
.tab-pane.active{display:block}
.filter-bar{background:#131826;border:1px solid #1e2a3a;border-radius:10px;padding:12px 18px;margin-bottom:22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-label{font-size:.78rem;color:#94a3b8;font-weight:600;white-space:nowrap}
.filter-sel{background:#0d1117;border:1px solid #1e2a3a;border-radius:7px;color:#e2e8f0;padding:6px 12px;font-size:.82rem;outline:none;cursor:pointer;min-width:220px;transition:.2s}
.filter-sel:focus{border-color:#00b894;box-shadow:0 0 0 3px rgba(0,184,148,.1)}
.filter-sel option{background:#131826}
.filter-badge{font-size:.72rem;padding:3px 10px;border-radius:10px;background:rgba(0,184,148,.12);color:#00b894;font-weight:700;white-space:nowrap}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:16px;margin-bottom:28px}
.kpi{background:#1a2035;border:1px solid #1e2a3a;border-radius:12px;padding:18px 22px;transition:.2s;cursor:default}
.kpi:hover{border-color:#00b894;transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,184,148,.1)}
.kpi-val{font-size:2.1rem;font-weight:800;color:#00b894;line-height:1.1;letter-spacing:-1px}
.kpi-lbl{font-size:.72rem;color:#64748b;text-transform:uppercase;letter-spacing:.8px;margin-top:5px}
.charts-row{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:28px}
.chart-card{background:#1a2035;border:1px solid #1e2a3a;border-radius:12px;padding:22px}
.chart-title{font-size:.78rem;color:#94a3b8;font-weight:700;margin-bottom:18px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #1e2a3a;padding-bottom:10px}
.tbl-card{background:#1a2035;border:1px solid #1e2a3a;border-radius:12px;padding:22px}
.tbl-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.tbl-title{font-size:.9rem;font-weight:700;color:#e2e8f0}
.tbl-actions{display:flex;gap:10px;align-items:center}
input[type=search]{background:#0d1117;border:1px solid #1e2a3a;border-radius:8px;color:#e2e8f0;padding:7px 12px;font-size:.82rem;width:210px;outline:none;transition:.2s}
input[type=search]:focus{border-color:#00b894;box-shadow:0 0 0 3px rgba(0,184,148,.1)}
input[type=search]::placeholder{color:#475569}
.btn-csv{background:rgba(0,184,148,.1);color:#00b894;border:1px solid rgba(0,184,148,.3);border-radius:8px;padding:7px 14px;font-size:.82rem;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap}
.btn-csv:hover{background:rgba(0,184,148,.22)}
.tbl-wrap{overflow-x:auto;max-height:400px;overflow-y:auto;border-radius:8px;border:1px solid #1e2a3a}
table{width:100%;border-collapse:collapse;font-size:.79rem}
th{background:#0d1117;color:#64748b;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;position:sticky;top:0;z-index:1;white-space:nowrap;border-bottom:1px solid #1e2a3a}
td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:#cbd5e1;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(0,184,148,.06)}
.pub-bar{background:#131826;border-top:1px solid #1e2a3a;padding:10px 32px;display:flex;gap:24px;flex-wrap:wrap;align-items:center}
.pub-item{font-size:.74rem;color:#64748b;display:flex;align-items:center;gap:6px}
.pub-item strong{color:#94a3b8}
.pub-dot{width:7px;height:7px;border-radius:50%;background:#00b894;flex-shrink:0}
.pub-dot.wait{background:#f59e0b}
.wait-pane{text-align:center;padding:72px 20px}
.wait-icon{font-size:3.5rem;margin-bottom:16px}
.wait-pane h3{font-size:1.1rem;color:#94a3b8;margin-bottom:8px;font-weight:700}
.wait-pane p{color:#475569;font-size:.85rem}
.tbl-count{font-size:.74rem;color:#475569;margin-top:10px}
@media(max-width:768px){
  .charts-row{grid-template-columns:1fr}
  .tab-pane{padding:20px 16px}
  #header{padding:16px;flex-direction:column;gap:12px;align-items:flex-start}
  .hdr-right{align-items:flex-start}
  .pub-bar,.filter-bar{padding:10px 16px}
  .filter-sel{min-width:160px}
}
</style>
</head>

</div>

  const ki = find(['SPR','Pacotes estimados','Quantidade de sacas']);
  const gi = find(['Onda','Tipos de serviços','Cluster']);
  const vi = find(['Tipo de veículo','Tipo de Veículo']);
  const fi = find(['Transportadora','Tipos de serviços']);  
  return {
    ki: ki >= 0 ? ki : cols.length - 1,
    kl: ki >= 0 ? cols[ki] : 'Total',
    gi: gi >= 0 ? gi : 0,
    gl: gi >= 0 ? cols[gi] : 'Grupo',
    vi: vi >= 0 ? vi : 0,
    fi,
    fl: fi >= 0 ? cols[fi] : ''
  };
}


function getRowsFiltradas(id) {
  const { fi } = CONFIGS[id];
  const val = filtros[id] || '';
  if (!val || fi < 0) return D[id].rows;
  return D[id].rows.filter(r => r[fi] === val);
}

function getRowsVisiveis(id) {
  const rows = getRowsFiltradas(id);
  const el = document.getElementById('busca-' + id);
  const q = el ? el.value.toLowerCase() : '';
  if (!q) return rows;
  return rows.filter(r => r.some(c => c.toLowerCase().includes(q)));
}


function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


const PAL=['#00b894','#0984e3','#6c5ce7','#e17055','#fdcb6e','#00cec9','#e84393','#55efc4','#fd79a8','#a29bfe'];
const charts={};

function mkChart(cid,tipo,labels,vals,titulo){
  if(charts[cid]) charts[cid].destroy();
  const el=document.getElementById(cid);
  if(!el) return;
  const horiz=tipo==='bar'&&labels.length>5;
  charts[cid]=new Chart(el.getContext('2d'),{
    type:tipo==='doughnut'?'doughnut':'bar',
    data:{labels,datasets:[{label:titulo,data:vals,
      backgroundColor:tipo==='doughnut'?PAL.slice(0,labels.length):labels.map((_,i)=>PAL[i%PAL.length]+'cc'),
      borderColor:tipo==='doughnut'?PAL.slice(0,labels.length):labels.map((_,i)=>PAL[i%PAL.length]),
      borderWidth:tipo==='doughnut'?2:1,borderRadius:tipo!=='doughnut'?4:0}]},
    options:{indexAxis:horiz?'y':'x',responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:tipo==='doughnut',position:'right',labels:{color:'#94a3b8',font:{size:11},boxWidth:12}},
        tooltip:{backgroundColor:'#1e2a3a',titleColor:'#e2e8f0',bodyColor:'#94a3b8',borderColor:'#2d3748',borderWidth:1}
      },
      scales:tipo!=='doughnut'?{
        x:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
        y:{ticks:{color:'#64748b',font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}}
      }:{}}
  });
}


function renderKPIs(id,rows){
  const {ki,kl,gi,gl,vi}=CONFIGS[id];
  const tot=rows.length;
  const sm=rows.reduce((s,r)=>s+(parseFloat(r[ki])||0),0);
  const gr=new Set(rows.map(r=>r[gi])).size;
  const vt=new Set(rows.map(r=>r[vi])).size;
  document.getElementById('kpi-'+id).innerHTML=
    `<div class="kpi"><div class="kpi-val">${tot}</div><div class="kpi-lbl">Total de Rotas</div></div>`+
    `<div class="kpi"><div class="kpi-val">${sm.toLocaleString('pt-BR')}</div><div class="kpi-lbl">${esc(kl)}</div></div>`+
    `<div class="kpi"><div class="kpi-val">${gr}</div><div class="kpi-lbl">${esc(gl)}</div></div>`+
    `<div class="kpi"><div class="kpi-val">${vt}</div><div class="kpi-lbl">Tipos de Veículo</div></div>`;
}

function renderCharts(id,rows){
  const {ki,kl,gi,vi}=CONFIGS[id];
  const gm={};rows.forEach(r=>{const g=r[gi]||'(sem grupo)';gm[g]=(gm[g]||0)+(parseFloat(r[ki])||0);});
  const gs=Object.entries(gm).sort((a,b)=>b[1]-a[1]);
  mkChart('cg-'+id,'bar',gs.map(e=>e[0]),gs.map(e=>e[1]),kl);
  const vm={};rows.forEach(r=>{const v=r[vi]||'N/A';vm[v]=(vm[v]||0)+1;});
  const vs=Object.entries(vm).sort((a,b)=>b[1]-a[1]);
  mkChart('cv-'+id,'doughnut',vs.map(e=>e[0]),vs.map(e=>e[1]),'Veículos');
}

function renderTabela(id,rows){
  document.getElementById('tbl-'+id).querySelector('tbody').innerHTML=
    rows.map(r=>'<tr>'+r.map(c=>`<td>${esc(c)}</td>`).join('')+'</tr>').join('');
  document.getElementById('cnt-'+id).textContent=
    `Exibindo ${rows.length} de ${D[id].rows.length} rotas`;
}

function renderTudo(id,rows){
  renderKPIs(id,rows);
  renderCharts(id,rows);
  renderTabela(id,rows);
  const badge=document.getElementById('fbadge-'+id);
  if(badge){
    const val=filtros[id]||'';
    badge.textContent=val?`${rows.length} rotas · ${val}`:`${D[id].rows.length} rotas (todas)`;
  }
}

// ── Eventos ───────────────────────────────────────────────────
function aplicarFiltro(id){
  const sel=document.getElementById('fsel-'+id);
  filtros[id]=sel?sel.value:'';
  const busca=document.getElementById('busca-'+id);
  if(busca) busca.value='';          // limpa busca ao trocar filtro
  renderTudo(id,getRowsFiltradas(id));
}

function filtrar(id){
  renderTabela(id,getRowsVisiveis(id));
}

function csvDownload(id){
  const rows=getRowsFiltradas(id);
  const val=filtros[id]||'';
  const suf=val?'_'+val.replace(/[^a-zA-Z0-9À-ú]/g,'_').replace(/_+/g,'_'):'';
  const linhas=[D[id].cols.join(','),...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))];
  const blob=new Blob(['\uFEFF'+linhas.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`SGO3_${id}${suf}_${GERADO_EM.replace(/[\/:\s]/g,'')}.csv`;
  a.click();
}

function mostrarTab(id,btn){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  btn.classList.add('active');
}

// ── Construção do DOM ─────────────────────────────────────────
function buildUI(){
  const dataStr=GERADO_EM.split(' ')[0]||GERADO_EM;
  document.getElementById('badge-data').textContent=dataStr;
  document.getElementById('badge-at').textContent='Gerado em '+GERADO_EM;

  let tabs='',content='',pub='';

  ABAS_ORDEM.forEach((id,idx)=>{
    const ciclo=D[id];
    const tem=!!ciclo;
    const first=idx===0;

    // Tab
    const badge=tem
      ?`<span class="tab-badge ok">✓ ${ciclo.rows.length} rotas</span>`
      :`<span class="tab-badge wait">⏳ aguardando</span>`;
    tabs+=`<button class="tab-btn${first?' active':''}" onclick="mostrarTab('${id}',this)">${id} ${badge}</button>`;

    // Pane
    if(tem){
      const cfg=detectarConfig(ciclo.cols);
      CONFIGS[id]=cfg;
      filtros[id]='';

      // Opções únicas para o filtro
      let opts='<option value="">Todas</option>';
      if(cfg.fi>=0){
        const seen={},uniq=[];
        ciclo.rows.forEach(r=>{const v=r[cfg.fi];if(v&&!seen[v]){seen[v]=1;uniq.push(v);}});
        uniq.sort().forEach(v=>{opts+=`<option value="${esc(v)}">${esc(v)}</option>`;});
      }

      const filterBar=cfg.fi>=0
        ?`<div class="filter-bar">
            <span class="filter-label">🔍 ${esc(cfg.fl)}:</span>
            <select class="filter-sel" id="fsel-${id}" onchange="aplicarFiltro('${id}')">
              ${opts}
            </select>
            <span class="filter-badge" id="fbadge-${id}">${ciclo.rows.length} rotas (todas)</span>
          </div>`
        :'';

      content+=
        `<div id="pane-${id}" class="tab-pane${first?' active':''}">
          ${filterBar}
          <div class="kpi-row" id="kpi-${id}"></div>
          <div class="charts-row">
            <div class="chart-card">
              <div class="chart-title">Distribuição por ${esc(cfg.gl)}</div>
              <canvas id="cg-${id}" height="220"></canvas>
            </div>
            <div class="chart-card">
              <div class="chart-title">Distribuição por Veículo</div>
              <canvas id="cv-${id}" height="220"></canvas>
            </div>
          </div>
          <div class="tbl-card">
            <div class="tbl-header">
              <span class="tbl-title">Todas as Rotas — ${id}</span>
              <div class="tbl-actions">
                <input type="search" id="busca-${id}" placeholder="Buscar…" oninput="filtrar('${id}')">
                <button class="btn-csv" onclick="csvDownload('${id}')">⬇ CSV</button>
              </div>
            </div>
            <div class="tbl-wrap">
              <table id="tbl-${id}">
                <thead><tr>${ciclo.cols.map(c=>`<th>${esc(c)}</th>`).join('')}</tr></thead>
                <tbody></tbody>
              </table>
            </div>
            <div class="tbl-count" id="cnt-${id}"></div>
          </div>
        </div>`;
    } else {
      content+=
        `<div id="pane-${id}" class="tab-pane${first?' active':''}">
          <div class="wait-pane">
            <div class="wait-icon">⏳</div>
            <h3>Ciclo ${id} ainda não publicado</h3>
            <p>Aguardando a finalização da distribuição.</p>
          </div>
        </div>`;
    }

    
    const dot=tem?'<span class="pub-dot"></span>':'<span class="pub-dot wait"></span>';
    pub+=`<div class="pub-item">${dot}<strong>${id}</strong> · ${esc(tem?ciclo.publicadoEm:'Aguardando publicação')}</div>`;
  });

  document.getElementById('tabs-bar').innerHTML=tabs;
  document.getElementById('content').innerHTML=content;
  document.getElementById('pub-bar').innerHTML=pub;

  
  ABAS_ORDEM.forEach(id=>{ if(D[id]) renderTudo(id,D[id].rows); });
}

window.addEventListener('load',buildUI);
</script>
</body>
</html>
