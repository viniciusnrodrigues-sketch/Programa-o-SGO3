const CORES_ONDA   = ['#1a73e8','#34a853','#fa7b17','#9334e6','#1cb8c4'];
const CORES_CLUSTER= ['#0f3460','#1a73e8','#34a853','#fa7b17','#ea4335','#9334e6','#1cb8c4','#f9ab00','#e52592','#5f6368'];


function badgeOnda(onda) {
  const n = onda.replace('Onda ','');
  return `<span class="badge badge-onda${n}">${onda}</span>`;
}

// ── Formata número ───────────────────────────────────────────
function fmt(n) { return n.toLocaleString('pt-BR'); }


let maxSPR = 0;
Object.values(DADOS).forEach(d => d.rows.forEach(r => { if(+r.SPR > maxSPR) maxSPR = +r.SPR; }));
function sprBar(v) {
  const pct = Math.max(4, Math.round((+v / maxSPR) * 100));
  return `<div class="spr-bar"><div class="spr-fill" style="width:${pct}px"></div><span>${v}</span></div>`;
}

// ── Gera uma aba de MLP ──────────────────────────────────────
function criarAba(mlp, d) {
  const divId = `tab-${mlp.replace(/[^a-z0-9]/gi,'_')}`;

  
  const kpis = `
  <div class="kpi-row">
    <div class="kpi-card" style="--accent:#0f3460">
      <div class="kpi-label">Total de Rotas</div>
      <div class="kpi-value">${fmt(d.total_rotas)}</div>
      <div class="kpi-sub">rotas programadas</div>
    </div>
    <div class="kpi-card" style="--accent:#1a73e8">
      <div class="kpi-label">Total SPR</div>
      <div class="kpi-value">${fmt(d.total_spr)}</div>
      <div class="kpi-sub">pacotes para entrega</div>
    </div>
    <div class="kpi-card" style="--accent:#34a853">
      <div class="kpi-label">Ondas</div>
      <div class="kpi-value">${d.total_ondas}</div>
      <div class="kpi-sub">ondas de saída</div>
    </div>
    <div class="kpi-card" style="--accent:#fa7b17">
      <div class="kpi-label">Clusters</div>
      <div class="kpi-value">${d.total_clusters}</div>
      <div class="kpi-sub">regiões atendidas</div>
    </div>
  </div>`;

  // Gráficos
  const charts = `
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Rotas e SPR por Onda</div>
      <canvas id="chart-onda-${mlp}"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">Rotas por Cluster</div>
      <canvas id="chart-cluster-${mlp}"></canvas>
    </div>
  </div>`;

  // Tabela
  const table = `
  <div class="table-card">
    <div class="table-toolbar">
      <h3>Rotas Programadas</h3>
      <div class="toolbar-right">
        <input class="search-input" type="search" placeholder="🔍 Buscar rota, doca..." id="search-${mlp}" oninput="filtrarTabela('${mlp}')">
        <select class="filter-select" id="filt-onda-${mlp}" onchange="filtrarTabela('${mlp}')">
          <option value="">Todas as Ondas</option>
          ${Object.keys(d.ondas).map(o=>`<option>${o}</option>`).join('')}
        </select>
        <a class="btn-download" onclick="baixarCSV('${mlp}')" href="#">
          ⬇ Baixar CSV
        </a>
      </div>
    </div>
    <div class="table-wrap" id="table-wrap-${mlp}"></div>
    <div class="pagination" id="pag-${mlp}"></div>
  </div>`;

  return `<div class="tab-content" id="${divId}" style="display:none">${kpis}${charts}${table}</div>`;
}

// ── Renderiza gráficos ───────────────────────────────────────
function renderizarGraficos(mlp, d) {
  
  const ondasLabels = Object.keys(d.ondas);
  const ondasRotas  = ondasLabels.map(o => d.ondas[o].rotas);
  const ondasSPR    = ondasLabels.map(o => d.ondas[o].spr);

  new Chart(document.getElementById(`chart-onda-${mlp}`).getContext('2d'), {
    type: 'bar',
    data: {
      labels: ondasLabels,
      datasets: [
        { label: 'Rotas', data: ondasRotas, backgroundColor: CORES_ONDA.map(c=>c+'cc'), borderColor: CORES_ONDA, borderWidth:2, borderRadius:6, yAxisID:'y' },
        { label: 'SPR',   data: ondasSPR,   type:'line', borderColor:'#ea4335', backgroundColor:'#ea443520', borderWidth:2, tension:.3, pointRadius:5, yAxisID:'y1' }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ position:'top', labels:{ usePointStyle:true } } },
      scales:{
        y:  { beginAtZero:true, title:{ display:true, text:'Rotas' }, grid:{ color:'#f0f0f0' } },
        y1: { beginAtZero:true, position:'right', title:{ display:true, text:'SPR' }, grid:{ drawOnChartArea:false } }
      }
    }
  });

  
  const cLabels = Object.keys(d.clusters).map(c => c.replace(/^(vol_)?SGO1 - /,'').replace(' | ',' · '));
  const cRotas  = Object.values(d.clusters).map(v => v.rotas);

  new Chart(document.getElementById(`chart-cluster-${mlp}`).getContext('2d'), {
    type: 'bar',
    data: {
      labels: cLabels,
      datasets: [{ label:'Rotas', data:cRotas, backgroundColor:CORES_CLUSTER.map(c=>c+'cc'), borderColor:CORES_CLUSTER, borderWidth:1, borderRadius:4 }]
    },
    options: {
      responsive:true, maintainAspectRatio:false, indexAxis:'y',
      plugins:{ legend:{ display:false } },
      scales:{ x:{ beginAtZero:true, grid:{ color:'#f0f0f0' } }, y:{ grid:{ display:false }, ticks:{ font:{ size:11 } } } }
    }
  });
}


const estadoTabela = {};

function filtrarTabela(mlp) {
  const q    = document.getElementById(`search-${mlp}`).value.toLowerCase();
  const onda = document.getElementById(`filt-onda-${mlp}`).value;
  const rows = DADOS[mlp].rows.filter(r => {
    if(onda && r['Onda'] !== onda) return false;
    if(q) {
      const txt = Object.values(r).join(' ').toLowerCase();
      if(!txt.includes(q)) return false;
    }
    return true;
  });
  estadoTabela[mlp].filtrados = rows;
  estadoTabela[mlp].pagina = 0;
  renderizarTabela(mlp);
}

function renderizarTabela(mlp) {
  const est   = estadoTabela[mlp];
  const pg    = est.pagina;
  const tpg   = 20;
  const slice = est.filtrados.slice(pg*tpg, (pg+1)*tpg);
  const total = est.filtrados.length;

  const cols = [
    {k:'Onda',          l:'Onda'},
    {k:'Doca',          l:'Doca'},
    {k:'Rota otimizada',l:'Rota Otim.'},
    {k:'Rota original', l:'Rota Orig.'},
    {k:'Tipo de veículo',l:'Veículo'},
    {k:'Tipo de rota',  l:'Tipo de Rota'},
    {k:'Cluster',       l:'Cluster'},
    {k:'SPR',           l:'SPR'},
  ];

  let html = '<table><thead><tr>';
  cols.forEach(c => {
    const sorted = est.sortCol === c.k;
    const arrow  = sorted ? (est.sortDir === 'asc' ? '▲':'▼') : '⇅';
    html += `<th class="${sorted?'sorted':''}" onclick="sortarTabela('${mlp}','${c.k}')">${c.l} <span class="sort-arrow">${arrow}</span></th>`;
  });
  html += '</tr></thead><tbody>';

  slice.forEach(r => {
    html += '<tr>';
    cols.forEach(c => {
      let v = r[c.k] ?? '';
      if(c.k === 'Onda')  v = badgeOnda(v);
      if(c.k === 'SPR')   v = sprBar(v);
      if(c.k === 'Cluster') v = v.replace(/^(vol_)?SGO1 - /,'');
      html += `<td>${v}</td>`;
    });
    html += '</tr>';
  });
  html += '</tbody></table>';

  document.getElementById(`table-wrap-${mlp}`).innerHTML = html;

  // Paginação
  const totalPag = Math.ceil(total/tpg);
  let pagHtml = `<span>Exibindo ${pg*tpg+1}–${Math.min((pg+1)*tpg,total)} de ${total} rotas</span>`;
  pagHtml += '<div class="page-btns">';
  for(let i=0;i<totalPag;i++) {
    pagHtml += `<button class="page-btn ${i===pg?'active':''}" onclick="irPagina('${mlp}',${i})">${i+1}</button>`;
  }
  pagHtml += '</div>';
  document.getElementById(`pag-${mlp}`).innerHTML = pagHtml;
}

function sortarTabela(mlp, col) {
  const est = estadoTabela[mlp];
  if(est.sortCol === col) est.sortDir = est.sortDir==='asc'?'desc':'asc';
  else { est.sortCol=col; est.sortDir='asc'; }
  est.filtrados.sort((a,b) => {
    let av=a[col]??'', bv=b[col]??'';
    if(!isNaN(+av) && !isNaN(+bv)) { av=+av; bv=+bv; }
    else { av=av.toLowerCase(); bv=bv.toLowerCase(); }
    const cmp = av<bv?-1:av>bv?1:0;
    return est.sortDir==='asc'?cmp:-cmp;
  });
  renderizarTabela(mlp);
}

function irPagina(mlp, pg) {
  estadoTabela[mlp].pagina = pg;
  renderizarTabela(mlp);
}

// ── Download CSV ─────────────────────────────────────────────
function baixarCSV(mlp) {
  const csvTexto = DADOS[mlp].csv_raw;
  const blob = new Blob([csvTexto], {type:'text/csv;charset=utf-8;'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `SGO1_${mlp}_rotas.csv`;
  a.click();
  URL.revokeObjectURL(url);
  return false;
}


function ativarAba(mlp) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.style.display='none');
  const id = `tab-${mlp.replace(/[^a-z0-9]/gi,'_')}`;
  document.getElementById(id).style.display = 'block';
  document.querySelector(`[data-mlp="${mlp}"]`).classList.add('active');
}


(function init() {
  const tabsBar     = document.getElementById('tabsBar');
  const tabsContent = document.getElementById('tabsContent');
  const mlps = Object.keys(DADOS);

  mlps.forEach((mlp, i) => {
    
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i===0?' active':'');
    btn.dataset.mlp = mlp;
    btn.textContent = `MLP: ${mlp}`;
    btn.onclick = () => ativarAba(mlp);
    tabsBar.appendChild(btn);

    
    const d = DADOS[mlp];
    tabsContent.innerHTML += criarAba(mlp, d);

    
    estadoTabela[mlp] = {
      filtrados: [...d.rows],
      pagina:    0,
      sortCol:   'Doca',
      sortDir:   'asc',
    };
    
    estadoTabela[mlp].filtrados.sort((a,b) => {
      const av=+(a['Doca']||0), bv=+(b['Doca']||0);
      return av-bv;
    });
  });

  
  const primeiraId = `tab-${mlps[0].replace(/[^a-z0-9]/gi,'_')}`;
  document.getElementById(primeiraId).style.display = 'block';

  
  requestAnimationFrame(() => {
    mlps.forEach(mlp => {
      renderizarTabela(mlp);
      renderizarGraficos(mlp, DADOS[mlp]);
    });
  });
})();
</script>
</body>
