<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEX — Programação SGO3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}

 
.hero{background:linear-gradient(135deg,#0d1117,#161b27);padding:16px 24px;
      text-align:center;border-bottom:1px solid #21262d}
.hero h1{font-size:1.35rem;font-weight:700;color:#e6edf3;margin-bottom:2px}
.hero h1 span{color:#e67e22}
.hero .sub{color:#8b949e;font-size:.8rem}
#ts-linha{color:#6c9bcf;font-size:.76rem;margin-top:4px}

 
.kpis{display:flex;gap:8px;flex-wrap:wrap;padding:14px 16px 0}
.kpi{flex:1;min-width:120px;border-radius:8px;overflow:hidden;text-align:center;
     background:#161b27;border:1px solid #21262d}
.kpi-accent{height:3px}
.kpi-body{padding:9px 10px 10px}
.kpi .lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.kpi .val{font-size:1.45rem;font-weight:800;line-height:1.1}
.kpi .sub{font-size:.58rem;color:#8b949e;margin-top:2px}

 
.toolbar{padding:12px 16px 8px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.toolbar input[type=text]{
  flex:1;min-width:220px;background:#161b27;border:1px solid #30363d;
  border-radius:6px;padding:8px 12px;font-size:.85rem;color:#c9d1d9;outline:none}
.toolbar input:focus{border-color:#e67e22}
.cnt{color:#8b949e;font-size:.8rem;white-space:nowrap}
.btn-pdf{
  display:inline-flex;align-items:center;gap:6px;
  background:#1a2a1a;border:1px solid #56d364;color:#56d364;
  border-radius:6px;padding:7px 14px;font-size:.82rem;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-pdf:hover{background:#1e3a1e;box-shadow:0 0 8px rgba(86,211,100,.25)}

 
.tbl-container{padding:4px 16px 48px;overflow-x:auto}
.tbl-wrap{border-radius:8px;border:1px solid #21262d;overflow:hidden;background:#161b27}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{padding:9px 12px;background:#1c2333;color:#8b949e;font-weight:700;
         font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;
         white-space:nowrap;border-bottom:1px solid #21262d;
         cursor:pointer;user-select:none}
thead th:hover{color:#c9d1d9}
thead th.sort-asc::after{content:' ↑'}
thead th.sort-desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid #1a1f26;transition:background .12s}
tbody tr:hover{background:#1c2333}
tbody tr.sem-rota{opacity:.45}
td{padding:9px 12px;vertical-align:middle}
td.num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600}
.em-vazio{color:#8b949e}

 
.vb{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.68rem;
    font-weight:700;white-space:nowrap;margin:1px 2px}
.vb-passeio{background:rgba(88,166,255,.15);color:#58a6ff}
.vb-moto   {background:rgba(230,126,34,.15);color:#e67e22}
.vb-vuc    {background:rgba(86,211,100,.15);color:#56d364}
.vb-util   {background:rgba(227,179,65,.15);color:#e3b341}
.vb-carreta{background:rgba(244,112,103,.15);color:#f47067}
.vb-truck  {background:rgba(188,140,255,.15);color:#bc8cff}
.vb-outro  {background:rgba(139,148,158,.15);color:#8b949e}

 
.rota-chip{display:inline-block;background:#0d2020;color:#56d364;
           border:1px solid #1a4040;border-radius:4px;padding:1px 5px;
           font-size:.67rem;margin:1px 2px;font-family:'Consolas','Courier New',monospace;
           white-space:nowrap}

 
.sep-row td{background:#12191f;color:#56d364;font-size:.7rem;font-weight:700;
            text-transform:uppercase;letter-spacing:.06em;padding:5px 12px;
            border-top:1px solid #21262d;border-bottom:1px solid #21262d}

 
.standby{text-align:center;padding:90px 20px;color:#8b949e}
.standby .icon{font-size:3.5rem;margin-bottom:16px}
.standby h2{color:#c9d1d9;font-size:1.2rem;margin-bottom:8px}
.standby p{font-size:.88rem;line-height:1.6}

 
@media print{
  body{background:#fff;color:#111;font-size:11px}
  .hero,.toolbar,.tbl-container,.kpis{display:block!important}
  .hero{background:none;border-bottom:2px solid #111;padding:8px 0 6px;text-align:left}
  .hero h1{font-size:14px;color:#111}
  .hero h1 span{color:#c0500e}
  .hero .sub,.hero #ts-linha{color:#555;font-size:9px}
  .kpis{padding:6px 0;margin-bottom:6px}
  .kpi{background:#f5f5f5;border:1px solid #ddd;min-width:80px;flex:unset}
  .kpi .lbl,.kpi .val,.kpi .sub{color:#333!important}
  .kpi-accent{display:none}
  .toolbar{display:none!important}
  .tbl-container{padding:0;overflow:visible}
  .tbl-wrap{border:1px solid #ccc;border-radius:0}
  table{font-size:9px}
  thead th{background:#eee!important;color:#333!important;padding:5px 7px;
           cursor:default;font-size:8px}
  thead th::after{display:none}
  tbody tr.sem-rota{display:none!important}
  td{padding:5px 7px;color:#111}
  td.num{color:#111;font-weight:700}
  .sep-row{display:none!important}
  .vb{background:none!important;padding:0;font-size:8px;color:#111!important;
      font-weight:700;border:none;margin:0}
  .vb::before{content:'['}
  .vb::after{content:']'}
  .rota-chip{background:none;color:#111;border:none;padding:0;
             font-size:8px;font-family:monospace;margin:0 2px}
  .em-vazio{display:none}
  .btn-pdf{display:none!important}
  .hero-print-footer{display:block!important;font-size:8px;color:#888;margin-top:4px}
  @page{margin:15mm 12mm;size:A4 landscape}
}
.hero-print-footer{display:none}
</style>
</head>
<body>

<div class="hero">
  <h1>🗺️ Dashboard <span>NEX</span> — SGO3</h1>
  <div class="sub">Programação de agências e perfis de veículo</div>
  <div id="ts-linha">Carregando…</div>
  <div class="hero-print-footer" id="print-footer"></div>
</div>

<div class="kpis" id="kpis"></div>

<div class="toolbar">
  <input type="text" id="busca" placeholder="Buscar agência, nome, rota…" oninput="renderTabela()">
  <span class="cnt" id="cnt-vis"></span>
  <button class="btn-pdf" onclick="gerarPDF()">📄 Gerar PDF (agências com sacas)</button>
</div>

<div class="tbl-container">
  <div id="tbl-wrap"></div>
</div>

<script>
var DADOS_RAW = {"columns":[],"rows":[],"publicadoEm":"17/06/2026 22:12"};
var GERADO_EM = "17/06/2026 22:12";


function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return (n||0).toLocaleString('pt-BR'); }

function vbCls(tipo){
  var t = (tipo||'').toLowerCase();
  if(t.indexOf('passeio')>=0) return 'vb-passeio';
  if(t.indexOf('moto')>=0)    return 'vb-moto';
  if(t.indexOf('vuc')>=0)     return 'vb-vuc';
  if(t.indexOf('util')>=0)    return 'vb-util';
  if(t.indexOf('carreta')>=0) return 'vb-carreta';
  if(t.indexOf('truck')>=0||t.indexOf('caminhao')>=0) return 'vb-truck';
  return 'vb-outro';
}

function renderVeiculo(tipo){
  if(!tipo) return '<span class="em-vazio">—</span>';
  return tipo.split(' | ').map(function(t){
    t=t.trim();
    return '<span class="vb '+vbCls(t)+'">'+esc(t)+'</span>';
  }).join(' ');
}

function renderRotas(rotasStr){
  if(!rotasStr) return '<span class="em-vazio">—</span>';
  var chips = rotasStr.split(',').map(function(r){ return r.trim(); }).filter(Boolean);
  return chips.length
    ? chips.map(function(c){ return '<span class="rota-chip">'+esc(c)+'</span>'; }).join('')
    : '<span class="em-vazio">—</span>';
}


var ROWS_BASE = [];
var SORT = {col:'_prioridade', dir:'desc'};  

var COLS = [
  {key:'agencia', label:'Agência'},
  {key:'nome',    label:'Nome'},
  {key:'veiculo', label:'Tipo de Veículo'},
  {key:'rotas',   label:'Rotas'},
  {key:'sacas',   label:'Sacas',   cls:'num'},
  {key:'horario', label:'Horário'},
  {key:'pacotes', label:'Pacotes', cls:'num'}
];


function buildKpis(rows){
  var comRota   = rows.filter(function(r){ return r.sacas>0; }).length;
  var totalSac  = rows.reduce(function(s,r){ return s+(r.sacas||0);   },0);
  var totalPac  = rows.reduce(function(s,r){ return s+(r.pacotes||0); },0);
  var totalAg   = rows.length;

  function card(lbl,val,sub,cor){
    return '<div class="kpi">'
      +'<div class="kpi-accent" style="background:'+cor+'"></div>'
      +'<div class="kpi-body">'
      +'<div class="lbl" style="color:'+cor+'">'+lbl+'</div>'
      +'<div class="val">'+val+'</div>'
      +(sub?'<div class="sub">'+sub+'</div>':'')
      +'</div></div>';
  }
  document.getElementById('kpis').innerHTML =
    card('Agências',    fmt(totalAg),  'no ciclo',        '#e67e22')
   +card('Com sacas',  fmt(comRota),  'programadas',     '#56d364')
   +card('Sacas',      fmt(totalSac), 'total de rotas',  '#58a6ff')
   +card('Pacotes',    fmt(totalPac), 'total estimado',  '#bc8cff');
}


function renderTabela(){
  var q = (document.getElementById('busca').value||'').trim().toLowerCase();

  var filtered = ROWS_BASE.filter(function(r){
    if(!q) return true;
    return [r.agencia,r.nome,r.rotas,r.veiculo].join(' ').toLowerCase().indexOf(q)>=0;
  });

  
  var sorted = filtered.slice().sort(function(a,b){
    
    var pa = a.sacas>0?1:0, pb = b.sacas>0?1:0;
    if(pa!==pb) return pb-pa;
    
    var va = a[SORT.col]!==undefined?a[SORT.col]:'';
    var vb = b[SORT.col]!==undefined?b[SORT.col]:'';
    if(typeof va==='number'&&typeof vb==='number') return SORT.dir==='asc'?va-vb:vb-va;
    va=String(va).toLowerCase(); vb=String(vb).toLowerCase();
    if(va<vb) return SORT.dir==='asc'?-1:1;
    if(va>vb) return SORT.dir==='asc'?1:-1;
    return 0;
  });

  
  var th = COLS.map(function(c){
    var sc = SORT.col===c.key?' class="sort-'+SORT.dir+'"':'';
    return '<th'+sc+' onclick="clickSort(\''+c.key+'\')">'+c.label+'</th>';
  }).join('');

  
  var comRota = sorted.filter(function(r){ return r.sacas>0; });
  var semRota = sorted.filter(function(r){ return r.sacas===0; });

  function buildRow(r){
    var cls = r.sacas===0?' class="sem-rota"':'';
    return '<tr'+cls+'>'
      +'<td><strong>'+esc(r.agencia)+'</strong></td>'
      +'<td>'+esc(r.nome)+'</td>'
      +'<td>'+renderVeiculo(r.veiculo)+'</td>'
      +'<td>'+renderRotas(r.rotas)+'</td>'
      +'<td class="num">'+fmt(r.sacas)+'</td>'
      +'<td>'+(r.horario||'<span class="em-vazio">—</span>')+'</td>'
      +'<td class="num"><strong>'+fmt(r.pacotes)+'</strong></td>'
      +'</tr>';
  }

  var tbody = '';
  if(comRota.length){
    tbody += '<tr class="sep-row"><td colspan="7">✅ Com programação ('+comRota.length+')</td></tr>';
    tbody += comRota.map(buildRow).join('');
  }
  if(semRota.length){
    tbody += '<tr class="sep-row"><td colspan="7">⏳ Sem programação ('+semRota.length+')</td></tr>';
    tbody += semRota.map(buildRow).join('');
  }

  document.getElementById('cnt-vis').textContent =
    sorted.length+' agência'+(sorted.length!==1?'s':'');

  document.getElementById('tbl-wrap').innerHTML = sorted.length===0
    ? '<div style="padding:40px;text-align:center;color:#8b949e">Nenhuma agência encontrada.</div>'
    : '<div class="tbl-wrap"><table><thead><tr>'+th+'</tr></thead><tbody>'+tbody+'</tbody></table></div>';
}

function clickSort(col){
  if(SORT.col===col) SORT.dir=SORT.dir==='asc'?'desc':'asc';
  else{ SORT.col=col; SORT.dir=col==='pacotes'||col==='sacas'?'desc':'asc'; }
  renderTabela();
}




function gerarPDF(){
  var comSacas = ROWS_BASE.filter(function(r){ return r.sacas>0; });
  var totalPac = comSacas.reduce(function(s,r){ return s+(r.pacotes||0); },0);

  
  document.getElementById('print-footer').textContent =
    'Agências com sacas: '+comSacas.length+' | Total pacotes: '+totalPac.toLocaleString('pt-BR')
    +' | '+GERADO_EM;

  window.print();
}


function init(){
  var rawRows = Array.isArray(DADOS_RAW.rows)?DADOS_RAW.rows:[];

  if(rawRows.length===0){
    document.getElementById('kpis').innerHTML='';
    document.getElementById('tbl-wrap').innerHTML=
      '<div class="standby"><div class="icon">🗺️</div>'
      +'<h2>Dashboard NEX aguardando publicação</h2>'
      +'<p>Use o menu <strong>🚀 Dashboard SGO3 → 🗺️ Publicar NEX</strong> na planilha.</p></div>';
    document.getElementById('ts-linha').textContent='Sem dados publicados';
    return;
  }

  document.getElementById('ts-linha').textContent='Atualizado em '+GERADO_EM;
  ROWS_BASE = rawRows;
  buildKpis(rawRows);
  renderTabela();
}

init();
</script>
</body>
</html>
