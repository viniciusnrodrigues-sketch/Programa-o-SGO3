<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEX — Programação SGO3</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0d1117;color:#c9d1d9}
.hero{background:linear-gradient(135deg,#0d1117,#161b27);padding:16px 24px;text-align:center;border-bottom:1px solid #21262d}
.hero h1{font-size:1.3rem;font-weight:700;color:#e6edf3;margin-bottom:2px}
.hero h1 span{color:#e67e22}
.hero .sub{color:#8b949e;font-size:.8rem}
#ts-linha{color:#6c9bcf;font-size:.76rem;margin-top:4px}

 
.tabs{display:flex;background:#161b27;border-bottom:1px solid #21262d;
      position:sticky;top:0;z-index:100;overflow-x:auto}
.tab{flex:1;min-width:90px;padding:10px 8px;text-align:center;cursor:pointer;
     font-weight:700;font-size:.78rem;border-bottom:2px solid transparent;
     transition:all .2s;color:#8b949e;white-space:nowrap}
.tab.ativa{color:#e67e22;border-color:#e67e22;background:#1c2333}
.tab:hover:not(.ativa){background:#1c2333;color:#c9d1d9}
.badge-tab{border-radius:10px;padding:1px 6px;font-size:.65rem;font-weight:700;
           margin-left:4px;opacity:.9;background:#21262d;color:#8b949e}
.tab.ativa .badge-tab{background:rgba(230,126,34,.2);color:#e67e22}

.container{width:100%;padding:12px 14px 48px}
.painel{display:none}.painel.ativo{display:block}

 
.kpis{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.kpi{flex:1;min-width:100px;border-radius:8px;overflow:hidden;text-align:center;
     background:#161b27;border:1px solid #21262d;transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.35)}
.kpi-accent{height:3px;width:100%}
.kpi-body{padding:8px 7px 9px}
.kpi .lbl{font-size:.58rem;font-weight:700;margin-bottom:1px;white-space:nowrap;
          opacity:.9;letter-spacing:.03em;text-transform:uppercase}
.kpi .val{font-size:1.4rem;font-weight:800;line-height:1.15}
.kpi .sub{font-size:.56rem;color:#8b949e;margin-top:2px;white-space:nowrap}

 
.toolbar-row{display:flex;gap:8px;margin-bottom:7px;flex-wrap:wrap;align-items:center}
.toolbar-row input{background:#161b27;border:1px solid #30363d;border-radius:6px;
                   padding:7px 11px;font-size:.83rem;flex:1;min-width:200px;
                   color:#c9d1d9;outline:none}
.toolbar-row input:focus{border-color:#e67e22}
.chips-section{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;
               padding:7px 10px;background:#161b27;border:1px solid #21262d;border-radius:8px}
.chip-lbl{color:#8b949e;font-size:.72rem;font-weight:700;white-space:nowrap;
          min-width:54px;letter-spacing:.03em}
.chips-group{display:flex;flex-wrap:wrap;gap:5px;flex:1}
.chip-btn{background:#21262d;border:1px solid #30363d;border-radius:20px;
          color:#484f58;padding:4px 10px;font-size:.74rem;font-weight:700;
          cursor:pointer;transition:all .15s;outline:none;white-space:nowrap}
.chip-btn:hover{opacity:.8}
.chip-btn.active{background:#2a1e10;border-color:#e67e22;color:#e67e22}
.chip-ctrl{background:none;border:none;font-size:.72rem;cursor:pointer;padding:0 4px;white-space:nowrap}
.chip-ctrl.todos{color:#e67e22}.chip-ctrl.nenhum{color:#484f58}
.chip-ctrl:hover{opacity:.7}
.chip-sep{color:#30363d;font-size:.8rem;align-self:center}

 
.card{background:#161b27;border:1px solid #21262d;border-radius:10px;overflow:hidden;margin-bottom:12px}
.card-hdr{padding:9px 14px;font-weight:700;font-size:.84rem;color:#e6edf3;
          display:flex;justify-content:space-between;align-items:center;
          border-bottom:1px solid #21262d;background:#1a1e2e}
table{width:100%;border-collapse:collapse;font-size:.85rem}
thead th{background:#1c2333;color:#8b949e;padding:8px 11px;text-align:left;
         white-space:nowrap;position:sticky;top:0;z-index:10;font-size:.71rem;
         text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #30363d;
         cursor:pointer;user-select:none;transition:background .15s,color .15s}
thead th:hover{background:#21262d;color:#c9d1d9}
thead th.sort-desc{color:#e67e22}
thead th.sort-asc{color:#58a6ff}
tbody td{padding:8px 11px;border-bottom:1px solid #21262d;color:#c9d1d9;vertical-align:middle}
tbody tr:hover{background:#1c2333}
.vazio{text-align:center;padding:28px;color:#484f58;font-style:italic}

 
.ego-badge{border-radius:10px;padding:2px 8px;font-size:.68rem;font-weight:800;white-space:nowrap}
.ego-EGO3  {background:#2a1e10;color:#e67e22;border:1px solid #e67e22}
.ego-EGO7  {background:#0d1e35;color:#58a6ff;border:1px solid #58a6ff}
.ego-EGO12 {background:#1a1226;color:#bc8cff;border:1px solid #bc8cff}
.ego-EGO19 {background:#0d2020;color:#56d364;border:1px solid #56d364}
.ego-EGO20 {background:#1f1215;color:#f47067;border:1px solid #f47067}
.ego-EGO21 {background:#1a1a0f;color:#e3b341;border:1px solid #e3b341}
.ego-outro {background:#21262d;color:#8b949e;border:1px solid #30363d}

 
.vbadge{border-radius:10px;padding:2px 8px;font-size:.68rem;font-weight:700;white-space:nowrap}
.vb-van    {background:#0d1e35;color:#58a6ff;border:1px solid #388bfd}
.vb-vuc    {background:#1a1226;color:#bc8cff;border:1px solid #8957e5}
.vb-util   {background:#2a1e10;color:#e67e22;border:1px solid #c2410c}
.vb-carreta{background:#0d2020;color:#56d364;border:1px solid #3fb950}
.vb-truck  {background:#1a1a0f;color:#e3b341;border:1px solid #9e6a03}
.vb-outro  {background:#21262d;color:#8b949e;border:1px solid #30363d}

 
.cl-chip{background:#0d2020;color:#56d364;border:1px solid #238636;border-radius:6px;
         padding:1px 5px;font-size:.65rem;font-weight:700;margin-right:2px;white-space:nowrap}

 
.standby{text-align:center;padding:60px 20px;color:#484f58}
.standby-icon{font-size:2.5rem;margin-bottom:12px;animation:pulse 2s ease-in-out infinite}
.standby h2{font-size:1.1rem;font-weight:700;color:#8b949e;margin-bottom:8px}
.standby p{font-size:.85rem;line-height:1.6}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

footer{text-align:center;color:#484f58;font-size:.71rem;margin-top:18px;
       border-top:1px solid #21262d;padding-top:12px}

@media print{
  body{background:#fff!important;color:#000!important}
  .tabs{display:none!important}
  .painel{display:block!important}
  .chips-section,.toolbar-row{display:none!important}
  thead th{background:#eee!important;color:#333!important}
  .card{border:1px solid #ccc!important;background:#fff!important}
  .card-hdr{background:#eee!important;color:#000!important}
  tbody td{border-bottom:1px solid #eee!important;color:#000!important}
}
</style>
</head>

de de sacas":"","Pacotes":"","Horario de ofertas":""},{"Agencia":"BRNGO7466","Nome":"LC FERRAGISTA","Quantidade de sacas":"","Pacotes":"","Horario de ofertas":""},{"Agencia":"BRNGO7475","Nome":"GMH TUBOS E CONEXÕES","Quantidade de sacas":"","Pacotes":"","Horario de ofertas":""},{"Agencia":"BRNGO7533","Nome":"WI DESIGN","Quantidade de sacas":"","Pacotes":"","Horario de ofertas":""},{"Agencia":"BRNGO7534","Nome":"SUPER CÓPIAS","Quantidade de sacas":"","Pacotes":"","Horario de ofertas":""},{"Agencia":"BRDGO7539","Nome":"LACASA DELIVERY","Quantidade de sacas":"","Pacotes":"","Horario de ofertas":""},{"Agencia":"BRNGO970","Nome":"LOUCAS POR CHINELOS","Quantidade de sacas":"","Pacotes":"","Horario de ofertas":""}],"publicadoEm":"12/05/2026 00:09"};
var GERADO_EM = "12/05/2026 00:09";

 
var EGO_ORDEM = ['EGO3','EGO7','EGO12','EGO19','EGO20','EGO21'];

 
function esc(s){
  return String(s==null?'':s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

 
function trocarAba(ego, el){
  document.querySelectorAll('.painel').forEach(function(p){p.classList.remove('ativo');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('ativa');});
  var painel = document.getElementById('painel-'+ego);
  if(painel) painel.classList.add('ativo');
  el.classList.add('ativa');
}

 
function toggleChip(btn){
  btn.classList.toggle('active');
  filtrar(btn.getAttribute('data-ego'));
}
function todosChips(cid, ego, ativo){
  var el=document.getElementById(cid); if(!el)return;
  el.querySelectorAll('.chip-btn').forEach(function(b){
    ativo?b.classList.add('active'):b.classList.remove('active');
  });
  filtrar(ego);
}
function okChip(cid, val){
  var el=document.getElementById(cid); if(!el)return true;
  var all=el.querySelectorAll('.chip-btn'); if(!all.length)return true;
  var on=el.querySelectorAll('.chip-btn.active'); if(!on.length)return false;
  var vs=Array.prototype.map.call(on,function(b){return b.getAttribute('data-val');});
  return vs.indexOf(val)>=0;
}

 
function filtrar(ego){
  var busca=((document.getElementById('busca-'+ego)||{}).value||'').toLowerCase().trim();
  var tbody=document.getElementById('body-'+ego); if(!tbody)return;
  var cnt=0;
  tbody.querySelectorAll('tr').forEach(function(tr){
    if(tr.querySelector('.vazio'))return;
    var okB=!busca||tr.innerText.toLowerCase().indexOf(busca)>=0;
    var okV=okChip('vchips-'+ego, tr.getAttribute('data-veiculo')||'');
    var show=okB&&okV;
    tr.style.display=show?'':'none';
    if(show)cnt++;
  });
  var cntEl=document.getElementById('count-'+ego);
  if(cntEl)cntEl.textContent=cnt;
}

 
function egoBadge(ego){
  var cls=EGO_ORDEM.indexOf(ego)>=0?'ego-'+ego:'ego-outro';
  return "<span class='ego-badge "+cls+"'>"+esc(ego)+"</span>";
}

 
function vCls(v){
  var t=String(v||'').toLowerCase();
  if(t.indexOf('van')>=0)    return 'vb-van';
  if(t.indexOf('vuc')>=0)    return 'vb-vuc';
  if(t.indexOf('util')>=0)   return 'vb-util';
  if(t.indexOf('carreta')>=0)return 'vb-carreta';
  if(t.indexOf('truck')>=0||t.indexOf('toco')>=0)return 'vb-truck';
  return 'vb-outro';
}
function vIcon(v){
  var t=String(v||'').toLowerCase();
  if(t.indexOf('van')>=0)    return '🚗';
  if(t.indexOf('vuc')>=0)    return '🚐';
  if(t.indexOf('util')>=0)   return '🏎️';
  if(t.indexOf('carreta')>=0)return '🚌';
  if(t.indexOf('truck')>=0||t.indexOf('toco')>=0)return '🚛';
  return '🚚';
}
function veiculoBadge(v){
  if(!v)return "<span style='color:#484f58'>—</span>";
  return "<span class='vbadge "+vCls(v)+"'>"+vIcon(v)+" "+esc(v)+"</span>";
}

 
function clusterHtml(raw){
  if(!raw)return "<span style='color:#484f58'>—</span>";
  var ids=String(raw).split(/[,;\s]+/).map(function(s){return s.trim();}).filter(Boolean);
  if(!ids.length)return "<span style='color:#484f58'>—</span>";
  return ids.slice(0,4).map(function(id){
    return "<span class='cl-chip'>"+esc(id)+"</span>";
  }).join('')+(ids.length>4?'<span class="cl-chip" style="opacity:.6">+'+( ids.length-4)+'</span>':'');
}

 
function kpiCard(lbl,val,bg,cor,accent,sub){
  var ac=accent?"<div class='kpi-accent' style='background:"+accent+"'></div>":'';
  var sb=sub?"<div class='sub'>"+sub+"</div>":'';
  return "<div class='kpi' style='background:"+bg+"'>"+ac
    +"<div class='kpi-body'><div class='lbl' style='color:"+cor+"'>"+lbl+"</div>"
    +"<div class='val' style='color:"+cor+"'>"+val+"</div>"+sb+"</div></div>";
}

 
var _sd={};
function sortarTabela(ego,cIdx,th){
  var tbody=document.getElementById('body-'+ego); if(!tbody)return;
  var key=ego+'_'+cIdx;
  var dir=_sd[key]==='desc'?'asc':'desc'; _sd[key]=dir;
  th.closest('thead').querySelectorAll('th').forEach(function(h){
    h.classList.remove('sort-desc','sort-asc');
  });
  th.classList.add(dir==='desc'?'sort-desc':'sort-asc');
  var rows=Array.prototype.slice.call(tbody.querySelectorAll('tr')).filter(function(tr){
    return !tr.querySelector('.vazio') && tr.style.display!=='none';
  });
  rows.sort(function(a,b){
    var ca=a.querySelectorAll('td')[cIdx];
    var cb=b.querySelectorAll('td')[cIdx];
    var va=ca?(ca.innerText||'').trim():'';
    var vb=cb?(cb.innerText||'').trim():'';
    var na=parseFloat(va.replace(/[^0-9.,\-]/g,'').replace(',','.'));
    var nb=parseFloat(vb.replace(/[^0-9.,\-]/g,'').replace(',','.'));
    var cmp=(!isNaN(na)&&!isNaN(nb))?(na-nb):va.localeCompare(vb,'pt-BR',{sensitivity:'base'});
    return dir==='desc'?-cmp:cmp;
  });
  rows.forEach(function(r){tbody.appendChild(r);});
}

 
function buildUI(){
  var rows=Array.isArray(DADOS_RAW.rows)?DADOS_RAW.rows:[];
  var pubEm=DADOS_RAW.publicadoEm||GERADO_EM;

  document.getElementById('ts-linha').innerHTML=
    'Publicado em: <strong>'+esc(pubEm)+'</strong> &nbsp;|&nbsp; Total: <strong>'+rows.length+'</strong> rotas';

  
  var grupos={};
  rows.forEach(function(row){
    var ego=row.ego||'—';
    if(!grupos[ego])grupos[ego]=[];
    grupos[ego].push(row);
  });

  
  var egosPresentes=Object.keys(grupos);
  var egoOrder=EGO_ORDEM.filter(function(e){return grupos[e];});
  egosPresentes.forEach(function(e){if(egoOrder.indexOf(e)<0)egoOrder.push(e);});

  var totalPacotes=rows.reduce(function(s,r){return s+(r.pacotes||0);},0);

  
  var tabsHtml=egoOrder.map(function(ego,i){
    var cnt=(grupos[ego]||[]).length;
    return "<div class='tab"+(i===0?' ativa':'')+"' onclick='trocarAba(\""+esc(ego)+"\",this)'>"+
      esc(ego)+"<span class='badge-tab'>"+cnt+"</span></div>";
  }).join('');
  
  tabsHtml="<div class='tab ativa' onclick='trocarAba(\"TODAS\",this)'>Todas <span class='badge-tab'>"+rows.length+"</span></div>"+
    egoOrder.map(function(ego,i){
      var cnt=(grupos[ego]||[]).length;
      return "<div class='tab' onclick='trocarAba(\""+esc(ego)+"\",this)'>"+
        esc(ego)+"<span class='badge-tab'>"+cnt+"</span></div>";
    }).join('');
  document.getElementById('tabs-container').innerHTML=tabsHtml;

  
  var painéisHtml='';
  var painelEgos=['TODAS'].concat(egoOrder);
  painelEgos.forEach(function(ego,pIdx){
    var linhas=ego==='TODAS'?rows:(grupos[ego]||[]);
    var pkgTotal=linhas.reduce(function(s,r){return s+(r.pacotes||0);},0);

    
    var veicSet={};
    linhas.forEach(function(r){if(r.veiculo)veicSet[r.veiculo]=1;});
    var veics=Object.keys(veicSet).sort();

    var vChips=veics.map(function(v){
      return "<button class='chip-btn active' data-val='"+esc(v)+"' data-ego='"+esc(ego)+"' onclick='toggleChip(this)'>"+
        vIcon(v)+' '+esc(v)+"</button>";
    }).join('');

    
    var kpis=kpiCard('ROTAS',linhas.length,'#161b27','#e6edf3','#e67e22','neste grupo')+
      kpiCard('PACOTES',pkgTotal.toLocaleString('pt-BR'),'#161b27','#58a6ff','#388bfd','estimados')+
      kpiCard('VEÍCULOS',veics.length,'#161b27','#bc8cff','#8957e5','tipos distintos');
    if(ego==='TODAS'){
      kpis+=kpiCard('EGOs ATIVOS',egoOrder.length,'#161b27','#56d364','#3fb950','grupos');
    }

    
    var tbodyRows=linhas.map(function(r){
      var vVal=String(r.veiculo||'');
      return "<tr data-veiculo='"+esc(vVal)+"'>"+
        (ego==='TODAS'?"<td>"+egoBadge(r.ego||'—')+"</td>":'')+
        "<td style='font-weight:700;color:#e6edf3;font-family:monospace'>"+esc(r.rota)+"</td>"+
        "<td>"+clusterHtml(r.cluster)+"</td>"+
        "<td style='font-size:.8rem;color:#8b949e;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis' title='"+esc(r.detalhe)+"'>"+esc(r.detalhe)+"</td>"+
        "<td>"+veiculoBadge(r.veiculo)+"</td>"+
        "<td style='text-align:center;font-weight:700;color:#58a6ff'>"+((r.pacotes||0)>0?r.pacotes:'—')+"</td>"+
      "</tr>";
    }).join('');
    if(!tbodyRows) tbodyRows="<tr><td colspan='"+(ego==='TODAS'?6:5)+"' class='vazio'>Sem rotas</td></tr>";

    var thEgo=ego==='TODAS'?"<th onclick='sortarTabela(\"TODAS\",0,this)'>EGO</th>":'';
    var colOffset=ego==='TODAS'?1:0;

    painéisHtml+="<div id='painel-"+esc(ego)+"' class='painel"+(pIdx===0?' ativo':'')+"'>"+
      "<div class='kpis'>"+kpis+"</div>"+
      "<div class='toolbar-row'><input type='text' id='busca-"+esc(ego)+"' placeholder='Buscar rota, cluster, cidade...' oninput='filtrar(\""+esc(ego)+"\")'></div>"+
      (veics.length>1?
        "<div class='chips-section'><span class='chip-lbl'>Veículo</span>"+
        "<div class='chips-group' id='vchips-"+esc(ego)+"'>"+vChips+"</div>"+
        "<span class='chip-sep'>|</span>"+
        "<button class='chip-ctrl todos' onclick='todosChips(\"vchips-"+esc(ego)+"\",\""+esc(ego)+"\",true)'>Todos</button>"+
        "<button class='chip-ctrl nenhum' onclick='todosChips(\"vchips-"+esc(ego)+"\",\""+esc(ego)+"\",false)'>Nenhum</button></div>":'')+
      "<div class='card'>"+
        "<div class='card-hdr'><span>"+esc(ego==='TODAS'?'Todas as rotas':ego)+" &mdash; <span id='count-"+esc(ego)+"'>"+linhas.length+"</span> rota(s)</span></div>"+
        "<div style='overflow-x:auto;max-height:65vh;overflow-y:auto'>"+
          "<table><thead><tr>"+
            thEgo+
            "<th onclick='sortarTabela(\""+esc(ego)+"\","+colOffset+",this)'>ROTA</th>"+
            "<th onclick='sortarTabela(\""+esc(ego)+"\","+(colOffset+1)+",this)'>CLUSTER</th>"+
            "<th onclick='sortarTabela(\""+esc(ego)+"\","+(colOffset+2)+",this)'>DETALHE / CIDADES</th>"+
            "<th onclick='sortarTabela(\""+esc(ego)+"\","+(colOffset+3)+",this)'>TIPO VEÍCULO</th>"+
            "<th onclick='sortarTabela(\""+esc(ego)+"\","+(colOffset+4)+",this)' style='text-align:center'>PACOTES</th>"+
          "</tr></thead>"+
          "<tbody id='body-"+esc(ego)+"'>"+tbodyRows+"</tbody>"+
        "</table></div>"+
      "</div>"+
    "</div>";
  });

  document.getElementById('paineis-container').innerHTML=painéisHtml;
  document.getElementById('rodape').textContent=
    'Dashboard NEX · SGO3 · Goiânia · Publicado em: '+pubEm;
}

 
function buildStandby(){
  document.getElementById('ts-linha').textContent='Aguardando publicação';
  document.getElementById('paineis-container').innerHTML=
    "<div class='standby'>"+
      "<div class='standby-icon'>⏳</div>"+
      "<h2>Aguardando publicação</h2>"+
      "<p>Nenhuma rota NEX encontrada.<br>"+
      "Na planilha use o menu 🗺️ <strong style='color:#e67e22'>Publicar NEX</strong>.</p>"+
      "<p style='margin-top:8px;font-size:.75rem;color:#30363d'>SGO3 · "+esc(String(GERADO_EM||''))+"</p>"+
    "</div>";
}

 
window.addEventListener('load',function(){
  var rows=DADOS_RAW&&Array.isArray(DADOS_RAW.rows)?DADOS_RAW.rows:[];
  if(rows.length===0){buildStandby();}else{buildUI();}
});
</script>
